<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Vizo Access - App Móvil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #16e086;
      --primary-dark: #0da85c;
      --secondary: #2e4a55;
      --dark: #0e1c22;
      --danger: #e74c3c;
      --warning: #f39c12;
      --info: #3498db;
      --success: #2ecc71;
      --whatsapp: #25D366;
      --copy: #4a90e2;
      --text-secondary: rgba(255,255,255,0.7);
      --bg-dark: #0e1c22;
      --bg-light: #1a2f38;

      /* Tamaños para formulario */
      --text-form-xs: clamp(0.7rem, 2.8vw, 0.75rem);
      --text-form-sm: clamp(0.75rem, 3vw, 0.8rem);
      --text-form-base: clamp(0.8rem, 3.2vw, 0.85rem);
      
      /* Tamaños para lista - ICONOS MÁS GRANDES */
      --text-list-xs: clamp(0.65rem, 2.5vw, 0.7rem);
      --text-list-sm: clamp(0.7rem, 2.8vw, 0.75rem);
      --text-list-base: clamp(0.75rem, 3vw, 0.8rem);
      
      /* Tamaños generales */
      --text-xs: clamp(0.7rem, 2.8vw, 0.75rem);
      --text-sm: clamp(0.75rem, 3vw, 0.8rem);
      --text-base: clamp(0.8rem, 3.2vw, 0.85rem);
      --text-lg: clamp(0.85rem, 3.5vw, 0.9rem);
      --text-xl: clamp(0.9rem, 3.8vw, 0.95rem);

      --spacing-xs: clamp(4px, 1.5vw, 6px);
      --spacing-sm: clamp(6px, 2vw, 8px);
      --spacing-md: clamp(8px, 2.5vw, 10px);
      --spacing-lg: clamp(10px, 3vw, 12px);
      --spacing-xl: clamp(12px, 3.5vw, 15px);

      --border-radius: clamp(12px, 4vw, 18px);
      --border-radius-sm: clamp(8px, 2.5vw, 12px);
      --border-radius-lg: clamp(15px, 5vw, 20px);
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
      min-height: 100vh;
      padding: 0;
      margin: 0;
      font-size: var(--text-base);
    }

    body.logged-in {
      padding-bottom: 65px;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: var(--spacing-sm);
    }

    /* LOGIN */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0e1c22, #1a2f38);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-box {
      width: 90%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-logo {
      width: 100px;
      height: auto;
      margin-bottom: var(--spacing-lg);
    }

    .login-logo img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .login-title {
      color: var(--primary);
      font-size: var(--text-xl);
      font-weight: bold;
      margin-bottom: var(--spacing-lg);
      text-align: center;
    }

    .login-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--primary);
      border-radius: 50px;
      color: white;
      font-size: var(--text-sm);
    }

    .login-input:focus {
      outline: none;
      border-color: white;
    }

    .login-btn {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: var(--text-sm);
      cursor: pointer;
      margin-top: var(--spacing-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-sm);
      color: white;
      background: rgba(0,0,0,0.2);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--border-radius-lg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .header-logo img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .header-logo span {
      font-size: var(--text-sm);
      color: var(--primary);
      font-weight: bold;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    #companyDisplay {
      font-size: var(--text-xs);
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 50px;
    }

    .btn {
      padding: var(--spacing-xs) var(--spacing-sm);
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      transition: all 0.2s;
      font-size: var(--text-xs);
    }

    .btn i {
      font-size: var(--text-sm);
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-secondary {
      background: var(--secondary);
      color: white;
    }

    .btn-info {
      background: var(--info);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-whatsapp {
      background: var(--whatsapp);
      color: white;
    }

    .btn-copy {
      background: var(--copy);
      color: white;
    }

    /* BUSCADOR */
    .search-section {
      margin-bottom: var(--spacing-md);
    }

    .search-container {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      padding-left: 35px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--primary);
      border-radius: 50px;
      color: white;
      font-size: var(--text-sm);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: var(--text-sm);
    }

    /* Carrusel */
    .carousel-section {
      margin-bottom: var(--spacing-md);
    }

    .section-title {
      color: white;
      font-size: var(--text-sm);
      margin-bottom: var(--spacing-xs);
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .carousel-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: var(--border-radius);
      background: rgba(0,0,0,0.2);
      padding: var(--spacing-xs) 0;
    }

    .carousel-track {
      display: flex;
      gap: var(--spacing-xs);
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: var(--spacing-xs) var(--spacing-sm);
      scrollbar-width: none;
    }

    .carousel-item {
      flex: 0 0 auto;
      width: 65px;
      scroll-snap-align: start;
      text-align: center;
      cursor: pointer;
    }

    .carousel-item img {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .carousel-item span {
      display: block;
      font-size: var(--text-xs);
      color: white;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Resultados de búsqueda */
    .search-results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: var(--spacing-xs);
      margin-top: var(--spacing-sm);
      max-height: 300px;
      overflow-y: auto;
      padding: var(--spacing-xs);
      background: rgba(0,0,0,0.3);
      border-radius: var(--border-radius-sm);
    }

    .search-result-item {
      background: rgba(255,255,255,0.05);
      border-radius: var(--border-radius-sm);
      padding: var(--spacing-xs);
      text-align: center;
      cursor: pointer;
    }

    .search-result-item img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      margin-bottom: 2px;
    }

    .search-result-item span {
      display: block;
      font-size: var(--text-xs);
      color: white;
    }

    /* Tarjetas de formulario */
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      padding: var(--spacing-md);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      margin-bottom: var(--spacing-sm);
    }

    /* FORMULARIO */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-xs);
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      display: block;
      margin-bottom: 2px;
      color: var(--primary);
      font-weight: bold;
      font-size: var(--text-form-xs);
    }

    .form-group label i {
      margin-right: 2px;
      font-size: var(--text-form-sm);
    }

    .form-control {
      width: 100%;
      padding: var(--spacing-xs) var(--spacing-sm);
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(22, 224, 134, 0.3);
      border-radius: var(--border-radius-sm);
      color: white;
      font-size: var(--text-form-sm);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Campo de código - solo números */
    .code-input-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .code-input-group .form-control {
      flex: 1;
    }

    /* Ocultar flechas del input number */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .btn-auto {
      padding: var(--spacing-xs) var(--spacing-sm);
      background: var(--info);
      color: white;
      border: none;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      font-size: var(--text-form-xs);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .code-status {
      font-size: var(--text-form-xs);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .code-status.available {
      color: var(--success);
    }

    .code-status.taken {
      color: var(--danger);
    }

    .info-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--border-radius-sm);
      padding: var(--spacing-xs);
      margin-bottom: var(--spacing-xs);
      border-left: 3px solid var(--info);
    }

    .info-section h4 {
      color: var(--info);
      font-size: var(--text-form-sm);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .foto-thumbnail {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      margin-top: 2px;
      padding: 2px;
      background: rgba(0,0,0,0.3);
      border-radius: var(--border-radius-sm);
    }

    .foto-thumbnail img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .btn-icon-camera {
      background: var(--primary);
      color: #000;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-form-base);
      cursor: pointer;
      border: none;
    }

    /* LISTA DE COLABORADORES - ICONOS MÁS GRANDES */
    .lista-search {
      margin-bottom: var(--spacing-sm);
    }

    .employees-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: var(--spacing-sm);
      max-height: 60vh;
      overflow-y: auto;
      padding: var(--spacing-xs);
    }

    .employee-card {
      background: rgba(255,255,255,0.05);
      border-radius: var(--border-radius-sm);
      padding: var(--spacing-sm);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .employee-card:hover {
      background: rgba(22, 224, 134, 0.1);
    }

    .employee-card img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      margin-bottom: var(--spacing-xs);
    }

    .employee-card .employee-name {
      font-size: var(--text-list-sm);
      color: white;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .employee-card .employee-code {
      font-size: var(--text-list-xs);
      color: var(--primary);
      margin-bottom: var(--spacing-sm);
    }

    .employee-actions {
      display: flex;
      gap: var(--spacing-xs);
      margin-top: var(--spacing-xs);
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ICONOS MÁS GRANDES EN LA LISTA */
    .employee-actions button {
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--text-list-sm);
      border-radius: 30px;
      min-width: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .employee-actions button i {
      font-size: var(--text-list-base);
    }

    /* Bienvenida */
    .welcome-section {
      background: rgba(255,255,255,0.1);
      border-radius: var(--border-radius);
      padding: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
      border-left: 3px solid var(--primary);
    }

    /* Menú inferior */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 25, 30, 0.98);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: space-around;
      align-items: center;
      padding: var(--spacing-xs) 0;
      border-top: 1px solid var(--primary);
      z-index: 1000;
    }

    .bottom-nav.visible {
      display: flex;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-secondary);
      font-size: 10px;
      padding: 4px 0;
      cursor: pointer;
      background: none;
      border: none;
    }

    .nav-item i {
      font-size: var(--text-base);
      margin-bottom: 2px;
    }

    .nav-item.active {
      color: var(--primary);
    }

    /* Panel lateral */
    .side-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      max-width: 280px;
      height: 100vh;
      background: var(--bg-dark);
      backdrop-filter: blur(10px);
      z-index: 2000;
      transition: right 0.3s ease;
      padding: var(--spacing-lg);
      border-left: 2px solid var(--primary);
    }

    .side-panel.active {
      right: 0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      color: white;
    }

    .panel-header h3 {
      color: var(--primary);
      font-size: var(--text-sm);
    }

    .close-panel {
      background: none;
      border: none;
      color: white;
      font-size: var(--text-base);
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .panel-menu {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .panel-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: rgba(255,255,255,0.08);
      border-radius: var(--border-radius-sm);
      color: white;
      text-decoration: none;
      font-size: var(--text-xs);
      border: none;
      width: 100%;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1500;
      display: none;
    }

    .overlay.active {
      display: block;
    }

    /* Detalle */
    .detail-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
      z-index: 1100;
      overflow-y: auto;
      padding: var(--spacing-md);
      padding-bottom: 80px;
      display: none;
    }

    .detail-page.active {
      display: block;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      color: white;
    }

    .detail-header button {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      cursor: pointer;
    }

    .detail-avatar {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .detail-avatar img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }

    .detail-name {
      font-size: var(--text-base);
      color: var(--primary);
      margin: var(--spacing-xs) 0;
    }

    .detail-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-lg);
    }

    .detail-info-item {
      background: rgba(255,255,255,0.08);
      padding: var(--spacing-xs);
      border-radius: var(--border-radius-sm);
      border-left: 2px solid var(--primary);
    }

    .detail-actions {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-lg);
      justify-content: center;
    }

    .detail-actions button {
      flex: 1;
      padding: var(--spacing-sm);
      font-size: var(--text-xs);
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
    }

    /* Tarjeta para compartir */
    #shareCard {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 380px;
      background: linear-gradient(135deg, #1a2f38, #0e1c22);
      border-radius: 20px;
      padding: 20px;
      border: 3px solid var(--primary);
      z-index: -1;
    }

    /* Cámara */
    .camera-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }

    .camera-fullscreen.active {
      display: flex;
    }

    .camera-header {
      padding: var(--spacing-sm);
      display: flex;
      justify-content: space-between;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .camera-footer {
      padding: var(--spacing-md);
      display: flex;
      justify-content: center;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    .camera-preview-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-overlay {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }

    .face-message {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 12px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--text-xs);
    }

    .btn-camera-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      border: 4px solid var(--primary);
      cursor: pointer;
    }

    .btn-camera-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid white;
      color: white;
      cursor: pointer;
    }

    /* Preview */
    .preview-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }

    .preview-screen.active {
      display: flex;
    }

    async function sendToWhatsApp(employee) {
      try {
        const imageDataUrl = await generateEmployeeCard(employee);
        
        if (!imageDataUrl) {
          showLondonAlert('Error al generar la imagen', 'error');
          return;
        }
        
        const blob = await (await fetch(imageDataUrl)).blob();
        const file = new File([blob], 'colaborador.png', { type: 'image/png' });
        
        const nombreCompleto = `${employee.firstName || ''} ${employee.lastName || ''}`.trim() || 'Sin nombre';
        const texto = `*${nombreCompleto}*\nCódigo: ${employee.username}\nDepartamento: ${employee.departamento}\nÁrea: ${employee.areaTrabajo}\nTurno: ${employee.turnoHoras} horas\nJefe: ${employee.jefeCargo}\nPrecio/h: $${employee.precioHora || '0'}`;
        
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              title: 'Colaborador Vizo Access',
              text: texto,
              files: [file]
            });
            showLondonAlert('Enviado correctamente');
            return;
          } catch (error) {
            if (error.name !== 'AbortError') {
              console.log('Error al compartir:', error);

        const textoEncoded = encodeURIComponent(texto);
        const whatsappUrl = `https://wa.me/?text=${textoEncoded}`;

    async function obtenerUltimoCodigo() {

          collection(db, 'Ponche'),
          where('collaboratorId', '==', currentUser.uid),
          orderBy('username', 'desc')
        );
        const snapshot = await getDocs(q);
        let maxNumero = 0;
        snapshot.forEach(doc => {
          const data = doc.data();
          const match = (data.username || '').match(/EMP(\d+)/);
          if (match) {
            const num = parseInt(match[1]);
            if (num > maxNumero) maxNumero = num;
          }
        });
        codigoSecuencial = maxNumero + 1;
      } catch (error) {
        codigoSecuencial = 1;
      }
    }

    async function iniciarCamaraCompleta() {
      detenerCamaraCompleta();
      try {
        const constraints = {
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        cameraVideo.srcObject = stream;
      } catch (error) {
        showLondonAlert('Error al abrir cámara', 'error');
      }
    }

    function detenerCamaraCompleta() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        cameraVideo.srcObject = null;
      }
      if (faceDetectionInterval) {
        clearInterval(faceDetectionInterval);
        faceDetectionInterval = null;
      }
    }

    function iniciarDeteccionFacial() {
      if (!modelosCargados) return;
      faceDetectionInterval = setInterval(async () => {
        if (!cameraVideo.videoWidth) return;
        try {
          const detections = await faceapi.detectAllFaces(cameraVideo).withFaceLandmarks();
          if (detections.length > 0) {
            const detection = detections[0];
            const box = detection.detection.box;
            const videoWidth = cameraVideo.videoWidth;
            const videoHeight = cameraVideo.videoHeight;
            const centerX = box.x + box.width/2;
            const centerY = box.y + box.height/2;
            const targetCenterX = videoWidth/2;
            const targetCenterY = videoHeight/2;
            const distance = Math.sqrt(Math.pow(centerX - targetCenterX, 2) + Math.pow(centerY - targetCenterY, 2));
            const faceSize = box.width / videoWidth;
            
            if (distance < 100 && faceSize > 0.2 && faceSize < 0.5) {
              faceMessage.className = 'face-message good';
              faceMessage.innerHTML = '<i class="fas fa-check-circle"></i><span>¡Correcto!</span>';
            } else {
              faceMessage.className = 'face-message bad';
              let mensaje = '';
              if (faceSize < 0.2) mensaje = 'Acércate';
              else if (faceSize > 0.5) mensaje = 'Aléjate';
              else if (distance >= 100) mensaje = 'Centra';
              else mensaje = 'Ajusta';
              faceMessage.innerHTML = `<i class="fas fa-exclamation-triangle"></i><span>${mensaje}</span>`;
            }
          } else {
            faceMessage.className = 'face-message bad';
            faceMessage.innerHTML = '<i class="fas fa-info-circle"></i><span>Sin rostro</span>';
          }
        } catch (error) {}
      }, 500);
    }

        showLondonAlert('Este código ya está registrado', 'error');
        codeStatus.innerHTML = '<i class="fas fa-times-circle"></i> Código no disponible';
        codeStatus.className = 'code-status taken';
        return;
      }

      let embeddingFinal = embedding;
      if (!embedding && foto && modelosCargados) {
        try {
          const img = new Image();
          img.src = foto;
          await new Promise(resolve => img.onload = resolve);
          const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
          if (detection) {
            embeddingFinal = JSON.stringify(Array.from(detection.descriptor));
          }
        } catch (error) {}
      }

      const empleadoData = {
        username: codigo,
        firstName: nombre,
        lastName: apellido,
        turnoHoras: turno,
        departamento: depto,
        areaTrabajo: area,
        jefeCargo: jefe,
        precioHora: precio,
        fotoBase64: foto,
        collaboratorId: currentUser.uid,
        activo: true,
        updatedAt: Timestamp.now()
      };

      if (embeddingFinal) {
        empleadoData.facialEmbedding = embeddingFinal;
      }

      if (!id) {
        empleadoData.createdAt = Timestamp.now();
      }

      try {
        if (id) {
          await updateDoc(doc(db, 'Ponche', id), empleadoData);
          showLondonAlert('Actualizado');
        } else {
          await addDoc(collection(db, 'Ponche'), empleadoData);
          showLondonAlert('Guardado');
        }
        btnCancelarEdit.click();
        
        // Actualizar contador si es necesario
        const num = parseInt(codigoNumerico);
        if (num >= codigoSecuencial) {
          codigoSecuencial = num + 1;
        }
      } catch (error) {
        showLondonAlert('Error al guardar', 'error');
      }
    });

    // ==================== ALERTAS ====================
    function showLondonAlert(message, type = 'success') {
      const alertDiv = document.createElement('div');
      alertDiv.className = 'alert-london';
      alertDiv.style.background = type === 'success' ? '#16e086' : '#e74c3c';
      alertDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
      document.body.appendChild(alertDiv);
      setTimeout(() => alertDiv.remove(), 3000);
    }

    // Hacer funciones globales
    window.editarEmpleado = editarEmpleado;
    window.confirmarEliminar = confirmarEliminar;
    window.verDetalle = verDetalle;
  </script>
</body>
