<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asistencia Facial - Ultra Rápida</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    :root { 
      --primary: #16e086; 
      --primary-dark: #0da85c; 
      --secondary: #2e4a55; 
      --dark: #0e1c22; 
      --danger: #e74c3c; 
      --warning: #f39c12; 
      --info: #3498db;
      --purple: #9b59b6;
      --text-secondary: rgba(255,255,255,0.7);
    }
    
    body { 
      background: #000; 
      min-height: 100vh; 
      overflow: hidden; 
    }
    
    .fullscreen-container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
      background: #000; 
    }
    
    .camera-full { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      z-index: 1; 
    }
    
    #videoFacial { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scaleX(-1);
      /* Optimización: forzar aceleración por hardware */
      will-change: transform;
    }
    
    .overlay-content { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      padding: 15px; 
      pointer-events: none; 
    }
    
    .overlay-content * { pointer-events: auto; }
    
    /* Menú Hamburguesa Superior */
    .top-bar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: rgba(0,0,0,0.8); 
      backdrop-filter: blur(10px); 
      padding: 10px 15px; 
      border-radius: 50px; 
      border: 1px solid var(--primary); 
      color: white;
    }
    
    .menu-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    
    .menu-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .title { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-size: 1rem;
    }
    
    .status-led { 
      width: 8px; 
      height: 8px; 
      background: var(--primary); 
      border-radius: 50%; 
      animation: pulse 2s infinite; 
    }
    
    @keyframes pulse { 
      0%, 100% { opacity: 1; } 
      50% { opacity: 0.3; } 
    }
    
    /* Menú Desplegable */
    .menu-dropdown {
      position: absolute;
      top: 70px;
      right: 15px;
      background: rgba(0,0,0,0.95);
      border-radius: 20px;
      border: 2px solid var(--primary);
      padding: 20px;
      min-width: 280px;
      z-index: 100;
      display: none;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    
    .menu-dropdown.active {
      display: flex;
    }
    
    .menu-header {
      color: var(--primary);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      margin-bottom: 5px;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    
    .menu-item:hover {
      background: rgba(22,224,134,0.1);
      border-color: var(--primary);
      transform: translateX(5px);
    }
    
    .menu-item i {
      font-size: 1.2rem;
      color: var(--primary);
      width: 25px;
    }
    
    .menu-divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 5px 0;
    }
    
    /* Buscador en Menú */
    .search-section {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 15px;
      border: 1px solid var(--info);
    }
    
    .search-title {
      color: var(--info);
      font-size: 0.85rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .search-box-menu {
      display: flex;
      gap: 8px;
    }
    
    .search-input-menu {
      flex: 1;
      padding: 10px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--info);
      border-radius: 25px;
      color: white;
      font-size: 0.9rem;
    }
    
    .search-btn-menu {
      background: var(--info);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Resultado de Búsqueda en Menú */
    .search-result-menu {
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 10px;
      display: none;
    }
    
    .search-result-menu.active {
      display: block;
    }
    
    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .result-item:hover {
      background: rgba(22,224,134,0.1);
    }
    
    .result-item img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }
    
    .result-info {
      flex: 1;
    }
    
    .result-name {
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .result-code {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }
    
    .result-punch {
      background: var(--primary);
      border: none;
      color: #000;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Modal de Resultado Facial */
    .resultado-flotante { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      width: 85%; 
      max-width: 350px; 
      background: rgba(10,25,30,0.98); 
      backdrop-filter: blur(20px); 
      border-radius: 25px; 
      padding: 25px; 
      border: 3px solid var(--primary); 
      box-shadow: 0 0 40px rgba(22,224,134,0.4); 
      display: none; 
      flex-direction: column; 
      align-items: center;
      gap: 15px; 
      z-index: 50; 
    }
    
    .foto-colaborador { 
      width: 120px; 
      height: 120px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 4px solid var(--primary); 
      box-shadow: 0 0 25px rgba(22,224,134,0.4);
    }
    
    .nombre-colaborador { 
      color: white; 
      font-size: 1.4rem; 
      font-weight: bold; 
      text-align: center;
    }
    
    .codigo-display { 
      color: var(--primary); 
      font-size: 1rem; 
      font-family: monospace;
    }
    
    .tipo-registro { 
      padding: 10px 25px; 
      border-radius: 30px; 
      font-weight: bold; 
      font-size: 1.1rem;
      text-transform: uppercase;
    }
    
    .entrada { background: var(--primary); color: #000; }
    .salida { background: var(--danger); color: white; }
    
    .fecha-hora { 
      color: rgba(255,255,255,0.8); 
      font-size: 0.9rem; 
      text-align: center;
    }
    
    /* Alerta de Bloqueo Específica */
    .bloqueo-alert {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 400px;
      background: linear-gradient(135deg, rgba(231,76,60,0.95), rgba(192,57,43,0.95));
      border-radius: 25px;
      padding: 30px;
      border: 3px solid var(--danger);
      box-shadow: 0 0 50px rgba(231,76,60,0.6);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 60;
      text-align: center;
    }
    
    .bloqueo-icon {
      font-size: 4rem;
      color: white;
    }
    
    .bloqueo-title {
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
    }
    
    .bloqueo-message {
      color: rgba(255,255,255,0.9);
      font-size: 1.1rem;
      line-height: 1.5;
    }
    
    .bloqueo-detail {
      background: rgba(0,0,0,0.3);
      padding: 15px 20px;
      border-radius: 15px;
      color: white;
      font-size: 0.95rem;
      width: 100%;
    }
    
    .bloqueo-close {
      background: white;
      border: none;
      color: var(--danger);
      padding: 12px 30px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    
    /* Toast */
    .toast { 
      position: fixed; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      padding: 12px 25px; 
      border-radius: 50px; 
      background: rgba(0,0,0,0.95); 
      border: 2px solid var(--primary); 
      color: white; 
      z-index: 200; 
      display: none; 
      font-size: 0.95rem;
      max-width: 90%;
      text-align: center;
    }
    
    /* Login */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0e1c22, #1a2f38);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .login-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px;
      width: 90%;
      max-width: 380px;
      border: 2px solid var(--primary);
    }
    
    .login-card h2 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.5rem;
    }
    
    .login-input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      background: rgba(0,0,0,0.3);
      border: 2px solid var(--primary);
      border-radius: 15px;
      color: white;
      font-size: 1rem;
    }
    
    .login-btn {
      width: 100%;
      background: var(--primary);
      color: #000;
      border: none;
      padding: 15px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }
    
    /* Loading Optimizado */
    .loading-overlay { 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.98); 
      display: none; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      z-index: 500; 
    }
    
    .spinner { 
      border: 3px solid rgba(22,224,134,0.2); 
      border-top: 3px solid var(--primary); 
      border-radius: 50%; 
      width: 40px; 
      height: 40px; 
      animation: spin 0.8s linear infinite; 
    }
    
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h2><i class="fas fa-building"></i> Acceso Empresa</h2>
      <input type="text" id="username" class="login-input" placeholder="Usuario">
      <input type="password" id="password" class="login-input" placeholder="PIN">
      <button id="loginBtn" class="login-btn">Ingresar</button>
    </div>
  </div>

  <!-- App Principal -->
  <div id="appScreen" class="hidden">
    <div class="fullscreen-container">
      <div class="camera-full">
        <video id="videoFacial" autoplay muted playsinline></video>
      </div>

      <div class="overlay-content">
        <div class="top-bar">
          <div class="title">
            <div class="status-led"></div>
            <span>Asistencia Facial</span>
          </div>
          <button class="menu-btn" id="menuBtn" title="Menú">
            <i class="fas fa-bars"></i>
          </button>
        </div>

        <!-- Menú Desplegable -->
        <div class="menu-dropdown" id="menuDropdown">
          <div class="menu-header">Opciones Rápidas</div>
          
          <a href="gestion_colaboradores.html" class="menu-item">
            <i class="fas fa-user-cog"></i>
            <span>Gestión Colaboradores</span>
          </a>
          
          <a href="reportes.html" class="menu-item">
            <i class="fas fa-chart-bar"></i>
            <span>Reportes</span>
          </a>
          
          <a href="subusuarios.html" class="menu-item">
            <i class="fas fa-users-cog"></i>
            <span>Sub-Usuarios</span>
          </a>
          
          <div class="menu-divider"></div>
          
          <!-- Buscador Integrado -->
          <div class="search-section">
            <div class="search-title">
              <i class="fas fa-search"></i> Buscar por Código
            </div>
            <div class="search-box-menu">
              <input type="text" id="searchInput" class="search-input-menu" placeholder="Código...">
              <button class="search-btn-menu" id="searchBtn">
                <i class="fas fa-fingerprint"></i>
              </button>
            </div>
            <div class="search-result-menu" id="searchResult">
              <!-- Resultado dinámico -->
            </div>
          </div>
          
          <div class="menu-divider"></div>
          
          <a href="#" class="menu-item" id="logoutBtn" style="color: var(--danger);">
            <i class="fas fa-sign-out-alt" style="color: var(--danger);"></i>
            <span>Cerrar Sesión</span>
          </a>
        </div>
      </div>
      
      <!-- Resultado Facial -->
      <div id="resultadoFlotante" class="resultado-flotante">
        <img id="fotoColaborador" class="foto-colaborador" src="" alt="">
        <div id="nombreDisplay" class="nombre-colaborador">---</div>
        <div id="codigoDisplay" class="codigo-display">---</div>
        <div id="tipoDisplay" class="tipo-registro">---</div>
        <div id="fechaHoraDisplay" class="fecha-hora">---</div>
      </div>
      
      <!-- Alerta de Bloqueo Específica -->
      <div id="bloqueoAlert" class="bloqueo-alert">
        <i class="fas fa-ban bloqueo-icon"></i>
        <div class="bloqueo-title" id="bloqueoTitle">Registro Bloqueado</div>
        <div class="bloqueo-message" id="bloqueoMessage">---</div>
        <div class="bloqueo-detail" id="bloqueoDetail">---</div>
        <button class="bloqueo-close" onclick="cerrarBloqueo()">Entendido</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      getDocs, 
      addDoc, 
      query, 
      where, 
      orderBy, 
      limit, 
      Timestamp,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMTWJr3mISmNiP-e_KjCO9BdBPi7Uuug4",
      authDomain: "formulario-2-8929a.firebaseapp.com",
      projectId: "formulario-2-8929a",
      storageBucket: "formulario-2-8929a.appspot.com",
      messagingSenderId: "136908102526",
      appId: "1:136908102526:web:d0a3bc1e3cb91a3fcab12f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ========== CONFIGURACIÓN ULTRA OPTIMIZADA ==========
    const CONFIG = {
      UMBRAL_PRECISION: 0.55,
      DETECTION_INTERVAL: 1500, // Más lento para no saturar
      COOLDOWN_SEGUNDOS: 60,
      UMBRAL_HORAS_FUERZA_ENTRADA: 16,
      MIN_CONFIDENCE: 0.45,
      MODEL_URL: 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/',
      MAX_FACES: 1, // Solo 1 rostro
      SKIP_FRAMES: 2 // Saltar 2 de cada 3 frames
    };

    let faceMatcher = null;
    let employeesData = new Map();
    let isProcessing = false;
    let videoStarted = false;
    let detectionInterval = null;
    let modelosCargados = false;
    let currentUser = null;
    let frameCount = 0;
    let isMenuOpen = false;

    const video = document.getElementById('videoFacial');
    const toast = document.getElementById('toast');
    const menuBtn = document.getElementById('menuBtn');
    const menuDropdown = document.getElementById('menuDropdown');

    // ========== FUNCIONES UTILITARIAS ==========
    function showToast(msg, type='success') {
      toast.textContent = msg;
      toast.style.borderColor = type === 'success' ? 'var(--primary)' : 'var(--danger)';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    // ========== LOGIN ==========
    async function authenticateUser(username, pin) {
      const q = query(
        collection(db, "Collaborators"),
        where("username", "==", username),
        where("pin", "==", pin)
      );
      const snapshot = await getDocs(q);
      if (snapshot.empty) throw new Error('Credenciales incorrectas');
      
      const userDoc = snapshot.docs[0];
      return {
        uid: userDoc.id,
        username: userDoc.data().username,
        name: userDoc.data().companyName || username
      };
    }

    function loadSavedSession() {
      const saved = localStorage.getItem('currentUserAsistencia');
      return saved ? JSON.parse(saved) : null;
    }

    async function initWithUser(user) {
      currentUser = user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      
      await cargarModelos();
      await iniciarCamara();
      iniciarEscuchaEmpleados();
      iniciarDeteccionUltraOptimizada();
    }

    const savedUser = loadSavedSession();
    if (savedUser) initWithUser(savedUser);

    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        const user = await authenticateUser(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value.trim()
        );
        localStorage.setItem('currentUserAsistencia', JSON.stringify(user));
        await initWithUser(user);
      } catch (e) {
        showToast(e.message, 'error');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('currentUserAsistencia');
      location.reload();
    });

    // ========== MENÚ ==========
    menuBtn.addEventListener('click', () => {
      isMenuOpen = !isMenuOpen;
      menuDropdown.classList.toggle('active', isMenuOpen);
    });

    document.addEventListener('click', (e) => {
      if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
        isMenuOpen = false;
        menuDropdown.classList.remove('active');
      }
    });

    // ========== CARGA OPTIMIZADA ==========
    async function cargarModelos() {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(CONFIG.MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(CONFIG.MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(CONFIG.MODEL_URL)
      ]);
      modelosCargados = true;
    }

    async function iniciarCamara() {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: 'user',
          width: { ideal: 480 }, // Baja resolución para velocidad
          height: { ideal: 360 },
          frameRate: { ideal: 15 } // FPS reducidos
        } 
      });
      video.srcObject = stream;
      return new Promise((resolve) => {
        video.onloadedmetadata = () => {
          video.play();
          videoStarted = true;
          resolve();
        };
      });
    }

    // ========== ESCUCHA EMPLEADOS ==========
    function iniciarEscuchaEmpleados() {
      const q = query(
        collection(db, 'Ponche'),
        where('collaboratorId', '==', currentUser.uid)
      );
      
      onSnapshot(q, (snapshot) => {
        const descriptors = [];
        employeesData.clear();
        let count = 0;
        
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          if (data.activo !== false && data.fotoBase64 && data.username) {
            employeesData.set(data.username, {
              id: docSnap.id,
              ...data,
              status: data.status || 'active',
              diasSemanaNoLaborables: data.diasSemanaNoLaborables || [],
              fechaInicioLibre: data.fechaInicioLibre || null,
              fechaFinLibre: data.fechaFinLibre || null,
              tipoLibre: data.tipoLibre || null,
              diasLibreRestantes: data.diasLibreRestantes || 0
            });
            
            const img = new Image();
            img.src = data.fotoBase64;
            img.onload = async () => {
              const detection = await faceapi
                .detectSingleFace(img, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }))
                .withFaceLandmarks()
                .withFaceDescriptor();
                
              if (detection) {
                descriptors.push(new faceapi.LabeledFaceDescriptors(data.username, [detection.descriptor]));
              }
              
              count++;
              if (count === employeesData.size && descriptors.length > 0) {
                faceMatcher = new faceapi.FaceMatcher(descriptors, CONFIG.UMBRAL_PRECISION);
              }
            };
          }
        });
      });
    }

    // ========== VERIFICAR BLOQUEOS ESPECÍFICOS ==========
    function verificarBloqueos(codigo) {
      const emp = employeesData.get(codigo);
      if (!emp) return { bloqueado: true, mensaje: 'Colaborador no encontrado', tipo: 'error' };
      
      const hoy = new Date();
      const diaSemana = hoy.getDay(); // 0=Domingo, 6=Sábado
      
      // 1. Verificar días de semana no laborables
      const diasNoLaborables = emp.diasSemanaNoLaborables || [];
      if (diasNoLaborables.includes(diaSemana)) {
        const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        return {
          bloqueado: true,
          mensaje: `Hoy es ${nombresDias[diaSemana]} - No es día laborable para ti`,
          detalle: `Tus días no laborables: ${diasNoLaborables.map(d => nombresDias[d]).join(', ')}`,
          tipo: 'dia_no_laborable'
        };
      }
      
      // 2. Verificar período libre (vacaciones/licencia/permiso)
      if (emp.fechaInicioLibre && emp.fechaFinLibre) {
        const inicio = new Date(emp.fechaInicioLibre);
        const fin = new Date(emp.fechaFinLibre);
        const ahora = new Date();
        
        // Resetear horas para comparar solo fechas
        inicio.setHours(0,0,0,0);
        fin.setHours(23,59,59,999);
        const hoyNormalizado = new Date(ahora);
        hoyNormalizado.setHours(0,0,0,0);
        
        if (hoyNormalizado >= inicio && hoyNormalizado <= fin) {
          const tipoLibre = emp.tipoLibre || 'libre';
          const diasRestantes = Math.ceil((fin - hoyNormalizado) / (1000 * 60 * 60 * 24));
          
          let mensaje = '';
          let detalle = '';
          
          switch(tipoLibre) {
            case 'vacaciones':
              mensaje = 'Estás de vacaciones';
              detalle = `Te quedan ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''} de vacaciones. Disfruta tu descanso.`;
              break;
            case 'licencia':
              mensaje = 'Tienes una licencia activa';
              detalle = `Licencia válida por ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''} más.`;
              break;
            case 'permiso':
              mensaje = 'Tienes un permiso autorizado';
              detalle = `Permiso válido por ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''} más.`;
              break;
            default:
              mensaje = 'Estás marcado como no disponible';
              detalle = `Período libre: ${diasRestantes} día${diasRestantes !== 1 ? 's' : ''} restantes.`;
          }
          
          return {
            bloqueado: true,
            mensaje: mensaje,
            detalle: detalle,
            tipo: tipoLibre
          };
        }
      }
      
      // 3. Verificar estado inactivo
      if (emp.status === 'inactive') {
        return {
          bloqueado: true,
          mensaje: 'Tu cuenta está inactiva',
          detalle: 'Contacta al administrador para reactivar tu cuenta.',
          tipo: 'inactive'
        };
      }
      
      return { bloqueado: false, emp };
    }

    // ========== MOSTRAR ALERTA DE BLOQUEO ==========
    function mostrarBloqueo(info) {
      const alert = document.getElementById('bloqueoAlert');
      document.getElementById('bloqueoTitle').textContent = '⛔ Registro No Permitido';
      document.getElementById('bloqueoMessage').textContent = info.mensaje;
      document.getElementById('bloqueoDetail').textContent = info.detalle || '';
      alert.style.display = 'flex';
    }

    window.cerrarBloqueo = function() {
      document.getElementById('bloqueoAlert').style.display = 'none';
    };

    // ========== PROCESAR REGISTRO ==========
    async function procesarRegistro(codigo, confianza = 1.0, metodo = 'facial') {
      if (isProcessing || !currentUser) return;
      isProcessing = true;

      try {
        // Verificar bloqueos primero
        const verificacion = verificarBloqueos(codigo);
        if (verificacion.bloqueado) {
          mostrarBloqueo(verificacion);
          return;
        }
        
        const emp = verificacion.emp;
        
        // Verificar cooldown
        const q = query(
          collection(db, 'facialAttendance'),
          where('collaboratorCode', '==', codigo),
          where('collaboratorId', '==', currentUser.uid),
          orderBy('timestamp', 'desc'),
          limit(1)
        );
        
        const lastSnap = await getDocs(q);
        if (!lastSnap.empty) {
          const lastTime = lastSnap.docs[0].data().timestamp.toDate();
          const diff = (new Date() - lastTime) / 1000;
          if (diff < CONFIG.COOLDOWN_SEGUNDOS) {
            showToast(`⏳ Espera ${Math.ceil(CONFIG.COOLDOWN_SEGUNDOS - diff)} segundos`, 'error');
            return;
          }
        }
        
        // Determinar tipo (entry/exit)
        let tipo = 'entry';
        let parId = `PAR_${codigo}_${Date.now()}`;
        
        if (!lastSnap.empty) {
          const last = lastSnap.docs[0].data();
          const horasDiff = (new Date() - last.timestamp.toDate()) / (1000 * 60 * 60);
          
          if (horasDiff < CONFIG.UMBRAL_HORAS_FUERZA_ENTRADA && last.type === 'entry') {
            tipo = 'exit';
            parId = last.parId;
          }
        }
        
        // Crear registro - SIN SEGUNDOS CALCULADOS
        const ahora = new Date();
        const fecha = ahora.toISOString().split('T')[0];
        const hora = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}:00`; // Siempre :00
        
        const data = {
          collaboratorId: currentUser.uid,
          collaboratorName: currentUser.name,
          collaboratorCode: codigo,
          employeeName: `${emp.firstName || ''} ${emp.lastName || ''}`.trim() || codigo,
          employeeId: emp.id,
          timestamp: Timestamp.now(),
          fecha: fecha,
          hora: hora, // HH:MM:00
          type: tipo,
          confidence: confianza,
          method: metodo,
          parId: parId,
          registroId: `${codigo}_${Date.now()}`
        };
        
        await addDoc(collection(db, 'facialAttendance'), data);
        
        // Mostrar resultado
        document.getElementById('fotoColaborador').src = emp.fotoBase64 || '';
        document.getElementById('nombreDisplay').textContent = data.employeeName;
        document.getElementById('codigoDisplay').textContent = codigo;
        const tipoEl = document.getElementById('tipoDisplay');
        tipoEl.textContent = tipo === 'entry' ? '✅ ENTRADA' : '🚪 SALIDA';
        tipoEl.className = `tipo-registro ${tipo === 'entry' ? 'entrada' : 'salida'}`;
        document.getElementById('fechaHoraDisplay').textContent = `${fecha} ${hora}`;
        
        const resultado = document.getElementById('resultadoFlotante');
        resultado.style.display = 'flex';
        setTimeout(() => resultado.style.display = 'none', 4000);
        
        showToast(`${tipo === 'entry' ? 'Entrada' : 'Salida'} registrada`, 'success');
        
      } catch (e) {
        showToast('Error al registrar', 'error');
      } finally {
        isProcessing = false;
      }
    }

    // ========== DETECCIÓN ULTRA OPTIMIZADA ==========
    function iniciarDeteccionUltraOptimizada() {
      if (detectionInterval) clearInterval(detectionInterval);
      
      detectionInterval = setInterval(async () => {
        if (!faceMatcher || !videoStarted || isProcessing || !currentUser) return;
        
        frameCount++;
        if (frameCount % (CONFIG.SKIP_FRAMES + 1) !== 0) return;
        
        try {
          // Opciones mínimas para máxima velocidad
          const detection = await faceapi
            .detectSingleFace(
              video, 
              new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
            )
            .withFaceLandmarks()
            .withFaceDescriptor();
            
          if (detection) {
            const match = faceMatcher.findBestMatch(detection.descriptor);
            const confidence = 1 - match.distance;
            
            if (match.label !== 'unknown' && confidence >= CONFIG.MIN_CONFIDENCE) {
              await procesarRegistro(match.label, confidence, 'facial');
            }
          }
        } catch (e) {
          // Silenciar errores de detección
        }
      }, CONFIG.DETECTION_INTERVAL);
    }

    // ========== BUSCADOR MANUAL ==========
    document.getElementById('searchBtn').addEventListener('click', buscarManual);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') buscarManual();
    });

    function buscarManual() {
      const codigo = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!codigo) return;
      
      const resultDiv = document.getElementById('searchResult');
      const emp = employeesData.get(codigo) || 
                  Array.from(employeesData.entries()).find(([k, v]) => 
                    k.toLowerCase().includes(codigo) || 
                    (v.firstName && v.firstName.toLowerCase().includes(codigo))
                  )?.[1];
      
      if (emp) {
        resultDiv.innerHTML = `
          <div class="result-item" onclick="registrarManual('${emp.username}')">
            <img src="${emp.fotoBase64 || ''}" alt="">
            <div class="result-info">
              <div class="result-name">${emp.firstName || ''} ${emp.lastName || ''}</div>
              <div class="result-code">${emp.username}</div>
            </div>
            <button class="result-punch" onclick="event.stopPropagation(); registrarManual('${emp.username}')">
              <i class="fas fa-fingerprint"></i>
            </button>
          </div>
        `;
        resultDiv.classList.add('active');
      } else {
        resultDiv.innerHTML = '<div style="color: var(--danger); padding: 10px;">No encontrado</div>';
        resultDiv.classList.add('active');
      }
    }

    window.registrarManual = async function(codigo) {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResult').classList.remove('active');
      menuDropdown.classList.remove('active');
      isMenuOpen = false;
      await procesarRegistro(codigo, 1.0, 'manual');
    };
  </script>
