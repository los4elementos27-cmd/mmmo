<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Asistencia Facial Pro - Optimizado</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
  <style>
    /* Estilos base mantenidos para no afectar visuales */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
    :root { 
      --primary: #16e086; --danger: #e74c3c; --warning: #f39c12; --card-bg: rgba(30, 41, 48, 0.95);
      --text-base: 1rem; --spacing-md: 18px; --border-radius-lg: 36px;
    }
    body { background: #000; height: 100vh; overflow: hidden; }
    .fullscreen-container { position: relative; width: 100vw; height: 100vh; }
    #videoFacial { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .overlay-content { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; }
    .overlay-content * { pointer-events: auto; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 12px 20px; border-radius: 50px; color: white; border: 1px solid rgba(22, 224, 134, 0.3); }
    
    .status-indicator-large { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; background: var(--card-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid rgba(255,255,255,0.2); }
    .status-icon { font-size: 24px; margin-bottom: 4px; }
    .status-label { font-size: 10px; color: white; white-space: nowrap; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 10px; }
    
    .resultado-flotante { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: var(--card-bg); border-radius: 30px; padding: 30px; border: 2px solid var(--primary); display: none; flex-direction: column; align-items: center; gap: 15px; z-index: 100; text-align: center; color: white; }
    .foto-colaborador { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; }
    .tipo-registro { padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; }
    .entrada { background: var(--primary); color: black; }
    .salida { background: var(--danger); color: white; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; }
    .spinner { border: 4px solid rgba(22,224,134,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .login-container { position: fixed; inset: 0; background: #0a1a20; display: flex; justify-content: center; align-items: center; z-index: 1500; }
    .login-card { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; color: white; }
    .login-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
    .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: var(--primary); font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    /* Animación de pulso para detección */
    .detecting-anim { animation: pulse 1s infinite; color: var(--warning) !important; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h2 style="text-align: center; margin-bottom: 20px;">Acceso Empresa</h2>
      <input type="text" id="username" class="login-input" placeholder="Usuario">
      <input type="password" id="password" class="login-input" placeholder="PIN">
      <button id="loginBtn" class="btn">INGRESAR</button>
    </div>
  </div>

  <div id="appScreen" style="display: none;">
    <div class="fullscreen-container">
      <video id="videoFacial" autoplay muted playsinline></video>
      <div class="overlay-content">
        <div class="top-bar">
          <div><i class="fas fa-building"></i> <span id="companyName"></span></div>
          <button id="logoutBtn" style="background:none; border:none; color:var(--danger); font-weight:bold;">SALIR</button>
        </div>

        <div id="resultadoFlotante" class="resultado-flotante">
          <img id="fotoColaborador" src="" class="foto-colaborador">
          <h2 id="nombreDisplay">Nombre</h2>
          <p id="codigoDisplay">Código</p>
          <div id="tipoDisplay" class="tipo-registro">TIPO</div>
          <p id="fechaHoraDisplay" style="font-size: 0.8rem; opacity: 0.7;"></p>
        </div>

        <div class="status-indicator-large">
          <div id="statusIcon" class="status-icon"><i class="fas fa-user-clock"></i></div>
          <div id="statusLabel" class="status-label">Iniciando...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
    <p id="loadingText">Cargando...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, orderBy, limit, Timestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMTWJr3mISmNiP-e_KjCO9BdBPi7Uuug4",
      authDomain: "formulario-2-8929a.firebaseapp.com",
      projectId: "formulario-2-8929a",
      storageBucket: "formulario-2-8929a.appspot.com",
      messagingSenderId: "136908102526",
      appId: "1:136908102526:web:d0a3bc1e3cb91a3fcab12f"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);

    // --- CONFIGURACIÓN DE OPTIMIZACIÓN ---
    const OPTIMIZACION = {
      UMBRAL_DISTANCIA: 0.55,       // Más flexible para detección rápida
      MIN_ESTABILIDAD: 2,           // Solo necesita 2 frames iguales para confirmar (Antes era muy alto)
      FPS_DETECCION: 100,           // Milisegundos entre escaneos (10 por segundo)
      MODEL_URL: 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/',
      DETECTOR_OPTIONS: new faceapi.SsdMobilenetv1Options({ minConfidence: 0.3, maxResults: 1 })
    };

    let faceMatcher = null;
    let employeesData = new Map();
    let currentUser = null;
    let isProcessing = false;
    let lastMatch = { label: '', count: 0 };
    let blockedUntil = new Map();

    const video = document.getElementById('videoFacial');

    // --- FUNCIONES DE ESTADO ---
    function updateStatus(icon, text, isAnimating = false) {
      const iconEl = document.getElementById('statusIcon');
      iconEl.innerHTML = `<i class="fas fa-${icon}"></i>`;
      document.getElementById('statusLabel').textContent = text;
      isAnimating ? iconEl.classList.add('detecting-anim') : iconEl.classList.remove('detecting-anim');
    }

    // --- LÓGICA DE DETECCIÓN MEJORADA ---
    async function loopDeteccion() {
      if (!faceMatcher || isProcessing) {
        setTimeout(loopDeteccion, OPTIMIZACION.FPS_DETECCION);
        return;
      }

      try {
        const detection = await faceapi.detectSingleFace(video, OPTIMIZACION.DETECTOR_OPTIONS)
          .withFaceLandmarks()
          .withFaceDescriptor();

        if (detection) {
          const match = faceMatcher.findBestMatch(detection.descriptor);
          
          if (match.label !== 'unknown' && match.distance < OPTIMIZACION.UMBRAL_DISTANCIA) {
            // Verificar si el empleado está en tiempo de espera (1 min)
            if (blockedUntil.has(match.label) && Date.now() < blockedUntil.get(match.label)) {
              updateStatus('clock', 'Espera 1 min');
            } else {
              // Lógica de estabilidad ultra-rápida
              if (lastMatch.label === match.label) {
                lastMatch.count++;
              } else {
                lastMatch = { label: match.label, count: 1 };
              }

              updateStatus('eye', 'Identificando...', true);

              if (lastMatch.count >= OPTIMIZACION.MIN_ESTABILIDAD) {
                await ejecutarRegistro(match.label, match.distance);
              }
            }
          } else {
            updateStatus('user-slash', 'No reconocido');
            lastMatch = { label: '', count: 0 };
          }
        } else {
          updateStatus('user-clock', 'Buscando rostro...');
          lastMatch = { label: '', count: 0 };
        }
      } catch (e) { console.error(e); }

      setTimeout(loopDeteccion, OPTIMIZACION.FPS_DETECCION);
    }

    async function ejecutarRegistro(codigo, distancia) {
      isProcessing = true;
      updateStatus('spinner', 'Registrando...', true);
      
      try {
        const emp = employeesData.get(codigo);
        const { tipo, parId } = await obtenerTipoYPar(codigo);
        
        const ahora = new Date();
        const registro = {
          collaboratorId: currentUser.uid,
          collaboratorCode: codigo,
          employeeName: `${emp.firstName} ${emp.lastName}`,
          timestamp: Timestamp.now(),
          fecha: ahora.toISOString().split('T')[0],
          hora: ahora.toLocaleTimeString(),
          type: tipo,
          method: 'facial_fast',
          parId: parId
        };

        await addDoc(collection(db, 'facialAttendance'), registro);
        
        // Bloquear por 1 minuto para evitar duplicados
        blockedUntil.set(codigo, Date.now() + 60000);

        // Mostrar resultado
        document.getElementById('fotoColaborador').src = emp.fotoBase64;
        document.getElementById('nombreDisplay').textContent = emp.firstName;
        document.getElementById('codigoDisplay').textContent = codigo;
        document.getElementById('tipoDisplay').textContent = tipo === 'entry' ? 'ENTRADA OK' : 'SALIDA OK';
        document.getElementById('tipoDisplay').className = `tipo-registro ${tipo === 'entry' ? 'entrada' : 'salida'}`;
        document.getElementById('fechaHoraDisplay').textContent = registro.hora;
        
        document.getElementById('resultadoFlotante').style.display = 'flex';
        setTimeout(() => { document.getElementById('resultadoFlotante').style.display = 'none'; }, 4000);
        
      } catch (error) {
        console.error(error);
      } finally {
        isProcessing = false;
        lastMatch = { label: '', count: 0 };
      }
    }

    // --- CARGA DE DATOS Y MODELOS ---
    async function iniciarApp() {
      document.getElementById('loadingOverlay').style.display = 'flex';
      
      await faceapi.nets.ssdMobilenetv1.loadFromUri(OPTIMIZACION.MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(OPTIMIZACION.MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(OPTIMIZACION.MODEL_URL);
      
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: 640, height: 480 } 
      });
      video.srcObject = stream;
      
      iniciarSyncEmpleados();
      loopDeteccion();
      
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function iniciarSyncEmpleados() {
      const q = query(collection(db, 'Ponche'), where('collaboratorId', '==', currentUser.uid));
      onSnapshot(q, async (snap) => {
        const descriptors = [];
        for (const doc of snap.docs) {
          const data = doc.data();
          if (data.fotoBase64) {
            employeesData.set(data.username, data);
            const img = await faceapi.fetchImage(data.fotoBase64);
            const fullDesc = await faceapi.detectSingleFace(img, OPTIMIZACION.DETECTOR_OPTIONS).withFaceLandmarks().withFaceDescriptor();
            if (fullDesc) {
              descriptors.push(new faceapi.LabeledFaceDescriptors(data.username, [fullDesc.descriptor]));
            }
          }
        }
        if (descriptors.length > 0) faceMatcher = new faceapi.FaceMatcher(descriptors, OPTIMIZACION.UMBRAL_DISTANCIA);
      });
    }

    async function obtenerTipoYPar(codigo) {
      const q = query(collection(db, 'facialAttendance'), where('collaboratorCode', '==', codigo), orderBy('timestamp', 'desc'), limit(1));
      const snap = await getDocs(q);
      if (snap.empty || snap.docs[0].data().type === 'exit') {
        return { tipo: 'entry', parId: 'P' + Date.now() };
      }
      return { tipo: 'exit', parId: snap.docs[0].data().parId };
    }

    // --- LOGIN ---
    document.getElementById('loginBtn').onclick = async () => {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const q = query(collection(db, "Collaborators"), where("username", "==", user), where("pin", "==", pass));
      const snap = await getDocs(q);
      
      if (!snap.empty) {
        currentUser = { uid: snap.docs[0].id, name: user };
        document.getElementById('companyName').textContent = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        iniciarApp();
      } else {
        alert("Error de acceso");
      }
    };

    document.getElementById('logoutBtn').onclick = () => location.reload();

  </script>
</body>
</html>
