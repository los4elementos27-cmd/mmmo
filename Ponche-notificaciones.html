<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Admin Publicaciones - Vizo Access</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary: #00ff9d;
      --primary-dark: #00cc7a;
      --primary-glow: rgba(0, 255, 157, 0.4);
      --dark: #0a0f12;
      --darker: #050708;
      --danger: #ff4757;
      --warning: #ffa502;
      --success: #00ff9d;
      --text-secondary: rgba(255,255,255,0.7);
      --bg-dark: #0a0f12;
      --bg-light: #141a1f;
      --glass-bg: rgba(20, 26, 31, 0.85);
    }

    body {
      background: radial-gradient(circle at 10% 20%, var(--bg-dark), var(--darker));
      min-height: 100vh;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 0 15px var(--primary-glow));
    }

    .header h1 {
      color: var(--primary);
      font-size: 28px;
      margin-top: 10px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 25px;
      border: 1px solid rgba(0,255,157,0.2);
      margin-bottom: 20px;
    }

    .card h2 {
      color: var(--primary);
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,255,157,0.3);
      border-radius: 15px;
      color: white;
      font-size: 14px;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }

    select.form-control {
      cursor: pointer;
    }

    textarea.form-control {
      resize: vertical;
      min-height: 120px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: normal;
      color: white;
    }

    .radio-group input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .users-list {
      max-height: 250px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 10px;
      margin-top: 10px;
    }

    .users-list::-webkit-scrollbar {
      width: 6px;
    }

    .users-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .users-list::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .user-item:hover {
      background: rgba(0,255,157,0.1);
      border-color: rgba(0,255,157,0.3);
    }

    .user-item.selected {
      background: rgba(0,255,157,0.2);
      border-color: var(--primary);
    }

    .user-item img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .user-item .user-info {
      flex: 1;
    }

    .user-item .user-name {
      font-weight: 600;
      color: white;
    }

    .user-item .user-id {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .format-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .format-btn {
      background: rgba(0,255,157,0.15);
      border: 1px solid rgba(0,255,157,0.3);
      color: white;
      padding: 8px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .format-btn:hover {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }

    .image-upload-area {
      border: 2px dashed rgba(0,255,157,0.3);
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }

    .image-upload-area:hover {
      border-color: var(--primary);
      background: rgba(0,255,157,0.05);
    }

    .image-upload-area i {
      font-size: 40px;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .image-upload-area p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .image-preview {
      margin-top: 15px;
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 15px;
      border: 2px solid var(--primary);
    }

    .btn-remove-image {
      background: rgba(255,71,87,0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 12px;
    }

    .btn-remove-image:hover {
      background: var(--danger);
      color: white;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,255,157,0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 7, 8, 0.95);
      backdrop-filter: blur(10px);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
    }

    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 60px; height: 60px; border: 3px solid rgba(0,255,157,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--primary); font-size: 14px; letter-spacing: 2px; }

    .success-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3500;
    }

    .success-modal.active { display: flex; }
    .success-content {
      background: linear-gradient(135deg, var(--bg-light), var(--dark));
      border-radius: 40px;
      padding: 35px 40px;
      text-align: center;
      border: 1px solid var(--primary);
      animation: fadeSlideIn 0.4s ease;
      max-width: 300px;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-content i { font-size: 60px; color: var(--primary); margin-bottom: 15px; }
    .success-content h3 { color: var(--primary); margin-bottom: 10px; }
    .success-content p { color: var(--text-secondary); margin-bottom: 20px; }

    .alert {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 50px;
      z-index: 5000;
      font-size: 14px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .alert-success {
      background: var(--success);
      color: #000;
    }

    .alert-error {
      background: var(--danger);
      color: white;
    }

    .mensajes-previos {
      margin-top: 30px;
    }

    .mensajes-previos h3 {
      color: var(--primary);
      margin-bottom: 15px;
      font-size: 18px;
    }

    .mensaje-item {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 3px solid var(--primary);
    }

    .mensaje-item .mensaje-titulo {
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 5px;
    }

    .mensaje-item .mensaje-texto {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .mensaje-item .mensaje-destino {
      font-size: 11px;
      color: var(--info);
    }

    .mensaje-item .mensaje-fecha {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 5px;
    }

    .mensaje-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, #0a0f12, #050708);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-box {
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-logo img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 15px var(--primary-glow));
    }

    .login-title {
      color: var(--primary);
      font-size: 28px;
      font-weight: 800;
      margin: 20px 0;
    }

    .login-input {
      width: 100%;
      padding: 12px 20px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,157,0.3);
      border-radius: 50px;
      color: white;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">PROCESANDO...</div>
  </div>

  <div id="successModal" class="success-modal">
    <div class="success-content">
      <i class="fas fa-check-circle"></i>
      <h3>¡Éxito!</h3>
      <p id="successMessage">Operación completada</p>
      <button class="btn btn-primary" onclick="document.getElementById('successModal').classList.remove('active')">Aceptar</button>
    </div>
  </div>

  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <img src="https://firebasestorage.googleapis.com/v0/b/formulario-2-8929a.appspot.com/o/Vizo%20Access.png?alt=media&token=2e31c49c-ca38-4b5e-b35e-43dee12c16da">
      </div>
      <div class="login-title">ADMIN PUBLICACIONES</div>
      <input type="text" id="loginUsername" class="login-input" placeholder="Usuario">
      <input type="text" id="loginPassword" class="login-input" placeholder="PIN">
      <div id="loginAlert" style="color: var(--danger); font-size: 12px; display: none;"></div>
      <button id="loginBtn" class="login-btn"><i class="fas fa-sign-in-alt"></i> INGRESAR</button>
    </div>
  </div>

  <div id="appScreen" style="display: none;">
    <div class="container">
      <div class="header">
        <img src="https://firebasestorage.googleapis.com/v0/b/formulario-2-8929a.appspot.com/o/Vizo%20Access.png?alt=media&token=2e31c49c-ca38-4b5e-b35e-43dee12c16da">
        <h1>Panel de Publicaciones</h1>
        <p>Administra los mensajes que llegarán a los colaboradores</p>
      </div>

      <div class="card">
        <h2><i class="fas fa-paper-plane"></i> Nueva Publicación</h2>
        
        <div class="form-group">
          <label><i class="fas fa-users"></i> Destinatario</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="destinatarioType" value="all" checked> 
              <i class="fas fa-globe"></i> Todos los usuarios
            </label>
            <label>
              <input type="radio" name="destinatarioType" value="specific"> 
              <i class="fas fa-user"></i> Usuario específico
            </label>
          </div>
        </div>

        <div id="specificUserDiv" style="display: none;">
          <div class="form-group">
            <label><i class="fas fa-search"></i> Seleccionar Usuario</label>
            <input type="text" id="searchUserInput" class="form-control" placeholder="Buscar usuario...">
            <div class="users-list" id="usersList"></div>
            <input type="hidden" id="selectedUserId">
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-heading"></i> Título del Mensaje</label>
          <input type="text" id="messageTitle" class="form-control" placeholder="Ej: 📢 ATENCIÓN IMPORTANTE">
        </div>

        <div class="form-group">
          <label><i class="fas fa-paragraph"></i> Contenido del Mensaje</label>
          <div class="format-buttons">
            <button type="button" class="format-btn" id="btnBold"><i class="fas fa-bold"></i> Negrita</button>
            <button type="button" class="format-btn" id="btnItalic"><i class="fas fa-italic"></i> Cursiva</button>
            <button type="button" class="format-btn" id="btnUnderline"><i class="fas fa-underline"></i> Subrayado</button>
          </div>
          <textarea id="messageText" class="form-control" placeholder="Escribe tu mensaje aquí...&#10;&#10;Usa **texto** para negrita&#10;Usa *texto* para cursiva&#10;Usa __texto__ para subrayado"></textarea>
        </div>

        <div class="form-group">
          <label><i class="fas fa-image"></i> Imagen (opcional)</label>
          <div class="image-upload-area" id="imageUploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Haz clic para subir una imagen (se comprimirá automáticamente)</p>
          </div>
          <input type="file" id="messageImageInput" accept="image/*" style="display: none;">
          <div class="image-preview" id="imagePreview" style="display: none;">
            <img id="previewImg" src="">
            <div>
              <button type="button" class="btn-remove-image" id="removeImageBtn"><i class="fas fa-trash"></i> Eliminar imagen</button>
            </div>
          </div>
        </div>

        <button id="btnPublicar" class="btn btn-primary"><i class="fas fa-paper-plane"></i> PUBLICAR MENSAJE</button>
      </div>

      <div class="mensajes-previos">
        <h3><i class="fas fa-history"></i> Historial de Publicaciones</h3>
        <div id="mensajesRecientes"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, Timestamp, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMTWJr3mISmNiP-e_KjCO9BdBPi7Uuug4",
      authDomain: "formulario-2-8929a.firebaseapp.com",
      projectId: "formulario-2-8929a",
      storageBucket: "formulario-2-8929a.appspot.com",
      messagingSenderId: "136908102526",
      appId: "1:136908102526:web:d0a3bc1e3cb91a3fcab12f"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let allUsers = [];
    let currentImageBase64 = null;
    let allMessages = [];

    const showLoading = (show) => document.getElementById('loadingOverlay').classList.toggle('active', show);
    
    const showSuccess = (msg) => {
      document.getElementById('successMessage').innerText = msg;
      document.getElementById('successModal').classList.add('active');
    };
    
    const showAlert = (message, type = 'success') => {
      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type}`;
      alertDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(alertDiv);
      setTimeout(() => alertDiv.remove(), 3000);
    };

    function compressImage(base64, maxWidth = 800, maxHeight = 800, quality = 0.7) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          
          if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width = width * ratio;
            height = height * ratio;
          }
          
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
          resolve(compressedBase64);
        };
        img.src = base64;
      });
    }

    async function cargarTodosLosUsuarios() {
      try {
        const usersRef = collection(db, 'Collaborators');
        const usersSnap = await getDocs(usersRef);
        allUsers = [];
        for(const docSnap of usersSnap.docs) {
          const userData = docSnap.data();
          allUsers.push({
            id: docSnap.id,
            name: userData.companyName || userData.username || 'Usuario',
            username: userData.username || '',
            photo: userData.photoURL || 'https://via.placeholder.com/40'
          });
        }
        mostrarListaUsuarios(allUsers);
      } catch(e) {
        console.error('Error cargando usuarios:', e);
        showAlert('Error al cargar usuarios', 'error');
      }
    }

    function mostrarListaUsuarios(usuarios) {
      const container = document.getElementById('usersList');
      if(!container) return;
      
      if(usuarios.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">No hay usuarios registrados</div>';
        return;
      }
      
      container.innerHTML = usuarios.map(user => `
        <div class="user-item" data-user-id="${user.id}" data-user-name="${user.name.replace(/'/g, "\\'")}">
          <img src="${user.photo}" onerror="this.src='https://via.placeholder.com/40'">
          <div class="user-info">
            <div class="user-name">${user.name}</div>
            <div class="user-id">${user.username || user.id.substring(0, 8)}</div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.user-item').forEach(item => {
        item.addEventListener('click', () => {
          const userId = item.dataset.userId;
          const userName = item.dataset.userName;
          document.querySelectorAll('.user-item').forEach(i => i.classList.remove('selected'));
          item.classList.add('selected');
          document.getElementById('selectedUserId').value = userId;
          showAlert(`Usuario seleccionado: ${userName}`, 'success');
        });
      });
    }

    function insertFormat(type) {
      const textarea = document.getElementById('messageText');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const text = textarea.value;
      let before = text.substring(0, start);
      let selected = text.substring(start, end);
      let after = text.substring(end);
      
      if(type === 'bold') {
        textarea.value = before + '**' + selected + '**' + after;
      } else if(type === 'italic') {
        textarea.value = before + '*' + selected + '*' + after;
      } else if(type === 'underline') {
        textarea.value = before + '__' + selected + '__' + after;
      }
      textarea.focus();
    }

    async function publicarMensaje(mensajeExistente = null) {
      if(!currentUser) {
        showAlert('Debes iniciar sesión', 'error');
        return;
      }
      
      let destinatarioType, destinatario, title, text, imageBase64;
      
      if(mensajeExistente) {
        destinatarioType = mensajeExistente.destinatario === 'all' ? 'all' : 'specific';
        destinatario = mensajeExistente.destinatario;
        title = mensajeExistente.title;
        text = mensajeExistente.text;
        imageBase64 = mensajeExistente.imageBase64 || null;
      } else {
        destinatarioType = document.querySelector('input[name="destinatarioType"]:checked').value;
        destinatario = 'all';
        
        if(destinatarioType === 'specific') {
          destinatario = document.getElementById('selectedUserId').value;
          if(!destinatario) {
            showAlert('Selecciona un usuario específico', 'error');
            return;
          }
        }
        
        title = document.getElementById('messageTitle').value.trim();
        text = document.getElementById('messageText').value.trim();
        imageBase64 = currentImageBase64;
      }
      
      if(!text) {
        showAlert('Escribe un mensaje', 'error');
        return;
      }
      
      showLoading(true);
      
      try {
        await addDoc(collection(db, 'MensajesPublicados'), {
          title: title || '📢 Nuevo Mensaje',
          text: text,
          imageBase64: imageBase64 || null,
          destinatario: destinatario,
          creadoPor: currentUser.uid,
          creadoPorNombre: currentUser.name,
          createdAt: Timestamp.now(),
          iconType: 'bullhorn'
        });
        
        showSuccess(mensajeExistente ? 'Mensaje reenviado exitosamente' : 'Mensaje publicado exitosamente');
        
        if(!mensajeExistente) {
          document.getElementById('messageTitle').value = '';
          document.getElementById('messageText').value = '';
          currentImageBase64 = null;
          document.getElementById('imagePreview').style.display = 'none';
          document.getElementById('imageUploadArea').style.display = 'block';
          document.getElementById('selectedUserId').value = '';
          document.querySelectorAll('.user-item').forEach(item => item.classList.remove('selected'));
        }
        
        await cargarMensajesRecientes();
        
      } catch(e) {
        console.error('Error al publicar:', e);
        showAlert('Error al publicar mensaje', 'error');
      } finally {
        showLoading(false);
      }
    }

    async function reenviarMensaje(mensaje) {
      await publicarMensaje(mensaje);
    }

    async function eliminarMensaje(messageId) {
      if(confirm('¿Estás seguro de eliminar este mensaje?')) {
        showLoading(true);
        try {
          await deleteDoc(doc(db, 'MensajesPublicados', messageId));
          showSuccess('Mensaje eliminado');
          await cargarMensajesRecientes();
        } catch(e) {
          showAlert('Error al eliminar mensaje', 'error');
        } finally {
          showLoading(false);
        }
      }
    }

    async function cargarMensajesRecientes() {
      try {
        const mensajesRef = collection(db, 'MensajesPublicados');
        const q = query(mensajesRef, orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        const container = document.getElementById('mensajesRecientes');
        
        allMessages = [];
        
        if(snap.empty) {
          container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">No hay publicaciones recientes</div>';
          return;
        }
        
        container.innerHTML = '';
        for(const docSnap of snap.docs) {
          const msg = docSnap.data();
          const fecha = msg.createdAt?.toDate() || new Date();
          const destinoTexto = msg.destinatario === 'all' ? '📢 Todos los usuarios' : '👤 Usuario específico';
          
          allMessages.push({ id: docSnap.id, ...msg });
          
          const div = document.createElement('div');
          div.className = 'mensaje-item';
          div.innerHTML = `
            <div class="mensaje-titulo"><i class="fas fa-envelope"></i> ${msg.title || 'Mensaje'}</div>
            <div class="mensaje-texto">${msg.text.substring(0, 100)}${msg.text.length > 100 ? '...' : ''}</div>
            <div class="mensaje-destino"><i class="fas fa-users"></i> ${destinoTexto}</div>
            <div class="mensaje-fecha"><i class="far fa-calendar-alt"></i> ${fecha.toLocaleString()}</div>
            <div class="mensaje-actions">
              <button class="btn btn-secondary btn-sm" onclick="window.reenviarMensajePorId('${docSnap.id}')"><i class="fas fa-share"></i> Reenviar</button>
              <button class="btn btn-danger btn-sm" onclick="window.eliminarMensajePorId('${docSnap.id}')"><i class="fas fa-trash"></i> Eliminar</button>
            </div>
          `;
          container.appendChild(div);
        }
      } catch(e) {
        console.error('Error cargando mensajes:', e);
      }
    }

    window.reenviarMensajePorId = async (messageId) => {
      const message = allMessages.find(m => m.id === messageId);
      if(message) {
        await reenviarMensaje(message);
      }
    };

    window.eliminarMensajePorId = async (messageId) => {
      await eliminarMensaje(messageId);
    };

    function buscarUsuarios() {
      const searchTerm = document.getElementById('searchUserInput').value.toLowerCase();
      if(!searchTerm) {
        mostrarListaUsuarios(allUsers);
        return;
      }
      const filtered = allUsers.filter(user => 
        user.name.toLowerCase().includes(searchTerm) || 
        (user.username && user.username.toLowerCase().includes(searchTerm))
      );
      mostrarListaUsuarios(filtered);
    }

    document.getElementById('btnBold').addEventListener('click', () => insertFormat('bold'));
    document.getElementById('btnItalic').addEventListener('click', () => insertFormat('italic'));
    document.getElementById('btnUnderline').addEventListener('click', () => insertFormat('underline'));
    
    document.getElementById('imageUploadArea').addEventListener('click', () => {
      document.getElementById('messageImageInput').click();
    });
    
    document.getElementById('messageImageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(file) {
        showLoading(true);
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const compressed = await compressImage(ev.target.result, 800, 800, 0.6);
          currentImageBase64 = compressed;
          document.getElementById('previewImg').src = compressed;
          document.getElementById('imagePreview').style.display = 'block';
          document.getElementById('imageUploadArea').style.display = 'none';
          showLoading(false);
          showAlert('Imagen comprimida y lista', 'success');
        };
        reader.readAsDataURL(file);
      }
    });
    
    document.getElementById('removeImageBtn').addEventListener('click', () => {
      currentImageBase64 = null;
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('imageUploadArea').style.display = 'block';
      document.getElementById('messageImageInput').value = '';
    });
    
    document.querySelectorAll('input[name="destinatarioType"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const specificDiv = document.getElementById('specificUserDiv');
        specificDiv.style.display = e.target.value === 'specific' ? 'block' : 'none';
        if(e.target.value === 'specific' && allUsers.length === 0) {
          cargarTodosLosUsuarios();
        }
      });
    });
    
    document.getElementById('searchUserInput').addEventListener('input', buscarUsuarios);
    document.getElementById('btnPublicar').addEventListener('click', () => publicarMensaje());
    
    document.getElementById('loginBtn').onclick = async () => {
      const user = document.getElementById('loginUsername').value.trim();
      const pass = document.getElementById('loginPassword').value.trim();
      
      if(!user || !pass) {
        showAlert('Ingresa usuario y PIN', 'error');
        return;
      }
      
      showLoading(true);
      
      try {
        const q = query(collection(db, "Collaborators"), where("username", "==", user), where("pin", "==", pass));
        const snap = await getDocs(q);
        
        if(snap.empty) throw new Error('Credenciales incorrectas');
        
        const userDoc = snap.docs[0];
        currentUser = { 
          uid: userDoc.id, 
          name: userDoc.data().companyName || user,
          isAdmin: userDoc.data().isAdmin || false
        };
        
        localStorage.setItem('currentUserPublicaciones', JSON.stringify(currentUser));
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        
        cargarTodosLosUsuarios();
        cargarMensajesRecientes();
        
        showAlert(`Bienvenido ${currentUser.name}`, 'success');
        
      } catch(e) {
        document.getElementById('loginAlert').innerText = 'Credenciales incorrectas';
        document.getElementById('loginAlert').style.display = 'block';
        setTimeout(() => {
          document.getElementById('loginAlert').style.display = 'none';
        }, 3000);
      } finally {
        showLoading(false);
      }
    };
    
    const savedUser = localStorage.getItem('currentUserPublicaciones');
    if(savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        if(currentUser?.uid) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appScreen').style.display = 'block';
          cargarTodosLosUsuarios();
          cargarMensajesRecientes();
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
