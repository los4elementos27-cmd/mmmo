<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>RIFA POOL · ADMIN · Tómbola EN VIVO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --primary:#1a472a;--primary-dark:#0d2b1a;--primary-light:#2d6a4f;
  --success:#40916c;--warning:#e9c46a;--danger:#e76f51;--info:#3498db;
  --purple-dark:#0f0a1a;--purple-medium:#1a0f2e;--purple-light:#2a1a4e;
  --purple-glow:#3d2b5e;--white:#ffffff;--gray:#6c757d;
  --shadow-sm:0 2px 8px rgba(0,0,0,.15);--shadow-md:0 4px 12px rgba(0,0,0,.2);
  --shadow-lg:0 8px 24px rgba(0,0,0,.3);--shadow-xl:0 12px 32px rgba(0,0,0,.4);
  --radius:16px;--radius-sm:10px;--transition:all 0.2s ease;
  --glow:0 0 12px rgba(64,145,108,.3);
  --ball-size:100px;
}

html,body{height:100%;overflow-x:hidden}
body{font-family:'Quicksand',sans-serif;background:radial-gradient(ellipse at top,#1a0f2e 0%,#0f0a1a 100%);color:#fff;min-height:100vh;font-size:14px}

#loadingScreen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0f2e,#0f0a1a);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;transition:opacity .5s}
.loading-ball{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--purple-light),var(--success));display:flex;align-items:center;justify-content:center;font-size:36px;animation:floatBall 2s ease-in-out infinite,glow 2s ease-in-out infinite}
@keyframes floatBall{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(64,145,108,.3)}50%{box-shadow:0 0 30px rgba(64,145,108,.7)}}

#loginScreen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0f2e,#0f0a1a);display:none;align-items:center;justify-content:center;z-index:9000;padding:16px}
.login-card{background:rgba(26,15,46,.8);backdrop-filter:blur(12px);border:1px solid rgba(64,145,108,.2);border-radius:24px;padding:32px 28px;width:100%;max-width:340px;animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--purple-light),var(--success));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:34px;animation:floatBall 3s ease-in-out infinite}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--success),#a8dadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{text-align:center;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:24px;letter-spacing:.5px}
.inp-group{margin-bottom:14px}
.inp-group label{display:block;font-size:10px;font-weight:700;margin-bottom:5px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.8px}
.inp-group input,.inp-group select{width:100%;padding:11px 14px;border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);font-size:13px;background:rgba(45,27,78,.5);color:#fff;transition:var(--transition);font-family:'Quicksand',sans-serif}
.inp-group input:focus,.inp-group select:focus{outline:none;border-color:var(--success);box-shadow:0 0 0 2px rgba(64,145,108,.15)}
.btn-primary{background:linear-gradient(135deg,var(--purple-light),var(--success));border:none;padding:12px 18px;border-radius:var(--radius-sm);color:#fff;font-weight:700;cursor:pointer;width:100%;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Quicksand',sans-serif;transition:var(--transition)}
.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-secondary{background:rgba(45,27,78,.8);border:1px solid rgba(64,145,108,.25);padding:9px 16px;border-radius:var(--radius-sm);color:#fff;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-family:'Quicksand',sans-serif;transition:var(--transition)}
.btn-secondary:hover{background:rgba(45,27,78,1);border-color:var(--success);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,var(--success),#2d6a4f);border:none;padding:10px 16px;border-radius:var(--radius-sm);color:#fff;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:'Quicksand',sans-serif;transition:var(--transition)}
.btn-success:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-danger{background:linear-gradient(135deg,var(--danger),#c0392b);border:none;padding:10px 16px;border-radius:var(--radius-sm);color:#fff;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:'Quicksand',sans-serif;transition:var(--transition)}
.btn-danger:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-warning{background:linear-gradient(135deg,var(--warning),#d4a017);border:none;padding:8px 16px;border-radius:var(--radius-sm);color:#1a0a2e;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:'Quicksand',sans-serif;transition:var(--transition)}
.btn-warning:hover{transform:translateY(-2px);filter:brightness(1.05)}

#mainApp{display:none;min-height:100vh}
header{position:fixed;top:0;left:0;right:0;background:rgba(15,10,26,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(64,145,108,.15);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100;gap:10px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple-light),var(--success));border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.hdr-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--success),#a8dadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:.5px}
.badge-live{background:rgba(231,111,81,.2);color:var(--danger);border:1px solid rgba(231,111,81,.4);animation:pulse 1.2s infinite}
.badge-admin{background:rgba(64,145,108,.15);color:var(--success);border:1px solid rgba(64,145,108,.2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.main-content{padding:70px 12px 20px}
.section{display:none}
.section.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,10,26,.97);backdrop-filter:blur(10px);border-top:1px solid rgba(64,145,108,.15);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,14px);z-index:99}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:rgba(255,255,255,.45);font-size:9px;cursor:pointer;padding:7px 14px;border-radius:var(--radius-sm);transition:var(--transition);font-family:'Quicksand',sans-serif;font-weight:600}
.nav-item i{font-size:19px;transition:var(--transition)}
.nav-item.active{color:var(--success);background:rgba(64,145,108,.12);transform:translateY(-2px)}

.card{background:rgba(45,27,78,.45);backdrop-filter:blur(6px);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06);transition:var(--transition)}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(64,145,108,.15)}
.card-title{font-size:14px;font-weight:700;color:var(--success);font-family:'Playfair Display',serif;margin-bottom:12px;display:flex;align-items:center;gap:8px}

.stat-box{background:rgba(0,0,0,.25);border-radius:var(--radius-sm);padding:10px;text-align:center;border:1px solid rgba(255,255,255,.04)}
.stat-label{font-size:9px;color:rgba(255,255,255,.5);margin-bottom:4px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.stat-value{font-size:18px;font-weight:800;font-family:'Orbitron',monospace}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:12px}

#toastContainer{position:fixed;bottom:24px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:linear-gradient(135deg,var(--purple-medium),var(--purple-dark));border-radius:var(--radius-sm);padding:10px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:slideInRight .25s ease;border-left:3px solid var(--success);font-size:12px;color:#fff;font-weight:600;backdrop-filter:blur(8px);max-width:280px}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:2000;padding:14px}
.modal.active{display:flex}
.modal-content{background:linear-gradient(135deg,var(--purple-medium),var(--purple-dark));border-radius:var(--radius);max-width:540px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;box-shadow:var(--shadow-xl);border:1px solid rgba(64,145,108,.2);animation:scaleIn .25s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.modal-title{font-size:16px;font-weight:700;font-family:'Playfair Display',serif;background:linear-gradient(135deg,var(--success),#a8dadc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-close{background:rgba(255,255,255,.1);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:var(--transition);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--danger);color:#fff;transform:rotate(90deg)}

.video-wrapper{position:relative;width:100%;background:#000;border-radius:var(--radius);overflow:hidden;border:2px solid rgba(64,145,108,.3);box-shadow:var(--shadow-xl)}
.video-wrapper::before{content:'';padding-top:56.25%;display:block}
#videoContainer,.video-placeholder{position:absolute;inset:0;width:100%;height:100%}
.video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(10,6,20,.9)}
.video-placeholder i{font-size:48px;color:rgba(255,255,255,.2)}
.video-placeholder p{color:rgba(255,255,255,.4);font-size:12px;text-align:center}

.live-indicator{position:absolute;top:12px;left:12px;z-index:10;background:rgba(231,111,81,.9);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;display:none;align-items:center;gap:5px;letter-spacing:1px;backdrop-filter:blur(4px)}
.live-indicator.active{display:flex}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.cam-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cam-btn{padding:12px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px;border:none;font-family:'Quicksand',sans-serif}
.cam-btn:active{transform:scale(.97)}
.cam-btn-start{background:linear-gradient(135deg,var(--success),#2d6a4f);color:#fff}
.cam-btn-start i{color:#fff}
.cam-btn-stop{background:rgba(231,111,81,.2);border:1px solid rgba(231,111,81,.4);color:var(--danger)}
.cam-btn-switch{background:rgba(52,152,219,.2);border:1px solid rgba(52,152,219,.4);color:var(--info)}

.progress-bar{background:rgba(255,255,255,.08);border-radius:8px;height:5px;overflow:hidden;margin:10px 0}
.progress-fill{background:linear-gradient(90deg,var(--success),#a8dadc);height:100%;border-radius:8px;transition:width .4s ease}

.loading-overlay{position:fixed;inset:0;background:rgba(15,10,26,.95);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10000}
.loading-ticket{background:linear-gradient(135deg,var(--purple-medium),var(--purple-dark));border-radius:var(--radius);padding:24px 32px;text-align:center;border:1px solid rgba(64,145,108,.3);box-shadow:var(--shadow-lg)}
.loading-ticket i{font-size:36px;color:var(--success);animation:spin 1s linear infinite;display:inline-block}
.loading-ticket p{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--success);margin-top:10px}
@keyframes spin{to{transform:rotate(360deg)}}

.winners-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.winner-card{background:linear-gradient(135deg,rgba(233,196,106,.1),rgba(64,145,108,.1));border:1px solid rgba(233,196,106,.25);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;gap:12px;animation:winnerCardIn .4s ease forwards}
@keyframes winnerCardIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.winner-medal{font-size:28px;flex-shrink:0}
.winner-number{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--warning)}
.winner-name{font-weight:700;font-size:13px}
.winner-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.winner-prize{font-size:10px;color:var(--success);font-weight:700;margin-top:3px}

.draw-arena{background:rgba(0,0,0,.4);border-radius:var(--radius);padding:24px;text-align:center;margin:14px 0;border:1px solid rgba(64,145,108,.12);position:relative;overflow:hidden}
.ball-container{display:flex;justify-content:center;align-items:center;margin:16px 0;height:140px;position:relative}
.main-ball{width:var(--ball-size);height:var(--ball-size);border-radius:50%;background:linear-gradient(135deg,#2a1a4e,#40916c);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;box-shadow:0 8px 32px rgba(64,145,108,.4);position:relative;transition:all .4s cubic-bezier(.34,1.56,.64,1);cursor:default;user-select:none}
.main-ball.spinning{animation:spinBall .08s linear infinite}
@keyframes spinBall{0%{transform:scale(1.02) rotate(-3deg)}50%{transform:scale(.98) rotate(3deg)}100%{transform:scale(1.02) rotate(-3deg)}}
.main-ball.winner{animation:winnerPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes winnerPop{0%{transform:scale(.8);box-shadow:0 0 0 rgba(233,196,106,.5)}40%{transform:scale(1.15)}70%{transform:scale(.95)}100%{transform:scale(1);box-shadow:0 0 40px rgba(233,196,106,.6)}}
.draw-subtitle{font-size:12px;color:rgba(255,255,255,.5);margin-top:6px;min-height:20px;font-weight:600}
.draw-prize-label{font-size:10px;color:var(--warning);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.countdown-bar{background:rgba(233,196,106,.08);border-radius:var(--radius-sm);padding:8px 14px;text-align:center;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--warning);border:1px solid rgba(233,196,106,.2);margin:8px 0;display:none}
.countdown-bar.active{display:block}

.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9990;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;opacity:0;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* Ventana flotante de cámara */
.floating-camera {
  position: fixed;
  bottom: 80px;
  right: 16px;
  width: 280px;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(64,145,108,.5);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  z-index: 1000;
  transition: all 0.3s ease;
  cursor: move;
  backdrop-filter: blur(4px);
}
.floating-camera.minimized {
  width: 80px;
  height: 80px;
  border-radius: 40px;
}
.floating-camera.minimized .floating-video video {
  width: 80px;
  height: 80px;
  object-fit: cover;
}
.floating-camera.minimized .floating-controls,
.floating-camera.minimized .floating-timer {
  display: none;
}
.floating-camera.minimized .floating-minimize-btn {
  display: flex;
}
.floating-video {
  width: 100%;
  background: #000;
  position: relative;
}
.floating-video video {
  width: 100%;
  height: auto;
  display: block;
}
.floating-controls {
  position: absolute;
  bottom: 8px;
  right: 8px;
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,.6);
  padding: 4px 8px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}
.floating-controls button {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  transition: all 0.2s;
}
.floating-controls button:hover {
  color: var(--danger);
  transform: scale(1.1);
}
.floating-timer {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,.7);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'Orbitron', monospace;
  color: var(--warning);
  backdrop-filter: blur(4px);
}
.floating-minimize-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,.7);
  border: none;
  color: #fff;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.floating-minimize-btn:hover {
  background: var(--success);
}
.floating-restore-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,.7);
  border: none;
  color: #fff;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.floating-restore-btn:hover {
  background: var(--success);
}

/* Pantalla completa TV */
.tv-fullscreen-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 11000;
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.3s ease;
}
.tv-fullscreen-header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.8), transparent);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
}
.tv-fullscreen-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--success);
}
.tv-fullscreen-timer {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--warning);
  background: rgba(0,0,0,.5);
  padding: 4px 12px;
  border-radius: 20px;
}
.tv-fullscreen-controls {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 16px;
  z-index: 10;
  background: linear-gradient(to top, rgba(0,0,0,.8), transparent);
  padding: 20px;
}
.tv-fullscreen-controls button {
  background: rgba(255,255,255,.2);
  border: none;
  color: #fff;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
.tv-fullscreen-controls button:hover {
  background: var(--danger);
  transform: scale(1.1);
}
#tvFullscreenVideo {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Cuenta regresiva elegante */
.countdown-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  animation: fadeInScale 0.5s ease;
}
@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.countdown-card {
  text-align: center;
  background: linear-gradient(135deg, rgba(42,26,78,.8), rgba(26,15,46,.9));
  padding: 40px 60px;
  border-radius: 40px;
  border: 1px solid rgba(64,145,108,.3);
  box-shadow: 0 0 60px rgba(64,145,108,.2);
}
.countdown-number {
  font-family: 'Orbitron', monospace;
  font-size: 120px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--warning), #f4a261);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: pulseGlow 1s infinite;
}

  0%,100% { text-shadow: 0 0 20px rgba(233,196,106,.3); }

}

/* Confirmación elegante */

  inset: 0;

<div id="toastContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, getDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-storage.js";

const fbCfg = { apiKey: "AIzaSyAMTWJr3mISmNiP-e_KjCO9BdBPi7Uuug4", authDomain: "formulario-2-8929a.firebaseapp.com", projectId: "formulario-2-8929a", storageBucket: "formulario-2-8929a.appspot.com", messagingSenderId: "136908102526", appId: "1:136908102526:web:d0a3bc1e3cb91a3fcab12f" };
const app = initializeApp(fbCfg);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null, allRaffles = [], allTickets = [], allPayments = [];
let activeLiveSession = null, activeSessionUnsub = null, raffleUnsub = null, ticketUnsub = null, paymentUnsub = null, configUnsub = null;
let currentStream = null, localVideoEl = null, camDevices = [], isCamRunning = false;
let floatingStream = null, isFloatingMinimized = false, floatingVideoEl = null;
let liveStartTime = null, liveTimerInterval = null;
let drawState = { active: false, raffleId: null, mode: 'online', prizeCount: 0, currentPrize: 0, remainingTickets: [], winnersSoFar: [], animInterval: null, timeout: null, countdownInterval: null };
let dragOffsetX = 0, dragOffsetY = 0;
let currentSection = 'Home';
let tvFullscreenActive = false;
let activeAdminIdForSession = null;

function $(id){ return document.getElementById(id); }
function padNum(n,d){ return String(n).padStart(d||3,'0'); }
function money(n){ return `RD$${parseFloat(n||0).toLocaleString('es-DO',{minimumFractionDigits:2})}`; }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString('es-DO',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return 'N/A'; } }
function getPrizeLbl(i){ return i===1?'🥇 1er LUGAR':i===2?'🥈 2do LUGAR':i===3?'🥉 3er LUGAR':`🏅 ${i}° LUGAR`; }
function getMedal(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':'🏅'; }
function getBallClass(i){ return i===0?'gold':i===1?'silver':i===2?'bronze':''; }
function generateRoomName(uid){ return `RifaPool_Live_${uid}_${Date.now().toString(36)}`; }

function showToast(msg, type='success'){
  const c = $('toastContainer'); if(!c) return;
  const t = document.createElement('div');
  t.className = 'toast';
  const colors = {success:'#40916c',error:'#e76f51',warning:'#e9c46a',info:'#3498db'};
  const icons = {success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
  t.style.borderLeftColor = colors[type]||colors.success;
  t.innerHTML = `<i class="fas ${icons[type]||icons.success}" style="color:${colors[type]||colors.success}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(60px)'; setTimeout(()=>t.remove(),300); }, 3500);
}

function showLoader(msg='Procesando...'){
  let el = $('globalLoader'); if(el) el.remove();
  el = document.createElement('div');
  el.id = 'globalLoader'; el.className = 'loading-overlay';
  el.innerHTML = `<div class="loading-ticket"><i class="fas fa-ticket-alt"></i><p>${msg}</p></div>`;
  document.body.appendChild(el);
}
function hideLoader(){ const el = $('globalLoader'); if(el) el.remove(); }
function closeModal(id){ const m=$(id); if(m) m.classList.remove('active'); }

function showConfirm(title, message, onConfirm) {
  const existing = document.querySelector('.confirm-modal');
  if(existing) existing.remove();
  
  const modal = document.createElement('div');
  modal.className = 'confirm-modal';
  modal.innerHTML = `
    <div class="confirm-card">
      <i class="fas fa-exclamation-triangle"></i>
      <h3>${title}</h3>
      <p>${message}</p>
      <div class="confirm-buttons">
        <button class="confirm-cancel" id="confirmCancelBtn">Cancelar</button>
        <button class="confirm-confirm" id="confirmConfirmBtn">Confirmar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  document.getElementById('confirmCancelBtn').onclick = () => modal.remove();
  document.getElementById('confirmConfirmBtn').onclick = () => { modal.remove(); onConfirm(); };
}

function showScreen(s){
  ['loadingScreen','loginScreen','mainApp'].forEach(id=>{ const el=$(id); if(el) el.style.display='none'; });
  const el=$(s+'Screen')||$(s);
  if(el) el.style.display='flex';
}
function showMain(){ $('loadingScreen').style.display='none'; $('loginScreen').style.display='none'; $('mainApp').style.display='block'; }

window.changeSection = function(name){
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const sec = $(`section${name}`); if(sec) sec.classList.add('active');
  const nav = $(`nav${name}`); if(nav) nav.classList.add('active');
  
  // Mostrar u ocultar ventana flotante según la sección
  const floating = $('floatingCamera');
  if(floating){
    if(name !== 'Stream' && isCamRunning && activeLiveSession && activeLiveSession.status === 'live'){
      floating.style.display = 'block';
      // Si estaba minimizada, mantener minimizada
      if(isFloatingMinimized){
        floating.classList.add('minimized');
      }
    } else if(name === 'Stream'){
      floating.style.display = 'none';
    } else if(!isCamRunning){
      floating.style.display = 'none';
    }
  }
  
  if(name==='Home') renderHome();
  if(name==='Stream') renderStream();
  if(name==='Draw') renderDraw();
  if(name==='History') renderHistory();
  if(name==='TV') renderTVSection();
};

// Login
window.doLogin = async function(){
  const u = $('adminUser')?.value.trim();
  const p = $('adminPass')?.value.trim();
  if(!u||!p){ showToast('Complete los campos','error'); return; }
  $('loginScreen').style.display='none';
  $('loadingScreen').style.display='flex';
  try{
    const q = query(collection(db,'Collaborators'), where('username','==',u), where('pin','==',p));
    const snap = await getDocs(q);
    if(snap.empty){ $('loginScreen').style.display='flex'; $('loadingScreen').style.display='none'; $('loginError').textContent='Usuario o contraseña incorrectos'; $('loginError').style.display='block'; return; }
    currentUser = { uid: snap.docs[0].id, ...snap.docs[0].data() };
    if(currentUser.role!=='admin'){ $('loginScreen').style.display='flex'; $('loadingScreen').style.display='none'; $('loginError').textContent='No tienes permisos de administrador'; $('loginError').style.display='block'; return; }
    activeAdminIdForSession = currentUser.uid;
    try{ localStorage.setItem('rifapool_live_admin', JSON.stringify({uid:currentUser.uid,name:currentUser.name,role:currentUser.role})); }catch(e){}
    await afterLogin();
  }catch(e){ $('loginScreen').style.display='flex'; $('loadingScreen').style.display='none'; showToast(e.message||'Error de conexión','error'); }
};

async function afterLogin(){
  $('userNameDisplay').textContent = currentUser.name || currentUser.username || 'Admin';
  startRealtime();
  showMain();
  
  // Intentar restaurar sesión activa anterior
  await restoreActiveSession();
  
  changeSection('Home');
  showToast(`¡Bienvenido, ${currentUser.name||currentUser.username}!`);
}

async function restoreActiveSession(){
  try{
    const q = query(collection(db,'liveSessions'), where('adminId','==',currentUser.uid), where('status','==','live'));
    const snap = await getDocs(q);
    if(!snap.empty){
      const sessionDoc = snap.docs[0];
      activeLiveSession = { id: sessionDoc.id, ...sessionDoc.data() };
      activeAdminIdForSession = currentUser.uid;
      liveStartTime = activeLiveSession.startedAt ? new Date(activeLiveSession.startedAt) : new Date();
      startLiveTimer();
      watchLiveSession(sessionDoc.id);
      showToast('Sesión en vivo restaurada automáticamente','success');
      
      // Cargar tickets restantes para el sorteo
      if(activeLiveSession.raffleId){
        const raffle = allRaffles.find(r=>r.id===activeLiveSession.raffleId);
        const tickets = allTickets.filter(t=>t.raffleId===activeLiveSession.raffleId);
        drawState.active = true;
        drawState.raffleId = activeLiveSession.raffleId;
        drawState.mode = activeLiveSession.mode;
        drawState.prizeCount = activeLiveSession.prizeCount || 1;
        drawState.remainingTickets = tickets.filter(t => !activeLiveSession.winners?.some(w=>w.number===t.number));
        drawState.winnersSoFar = activeLiveSession.winners || [];
      }
    }
  }catch(e){ console.warn('Error restoring session:', e); }
}

window.doLogout = function(){
  showConfirm('Cerrar Sesión', '¿Estás seguro de que deseas cerrar sesión?', () => {
    try{ localStorage.removeItem('rifapool_live_admin'); }catch(e){}
    [raffleUnsub,ticketUnsub,paymentUnsub,configUnsub,activeSessionUnsub].forEach(u=>{ if(u) u(); });
    stopCameraAndFloating();
    if(liveTimerInterval) clearInterval(liveTimerInterval);
    currentUser=null; allRaffles=[]; allTickets=[]; allPayments=[]; activeLiveSession=null;
    activeAdminIdForSession = null;
    $('loadingScreen').style.display='none';
    $('loginScreen').style.display='flex';
    $('mainApp').style.display='none';
  });
};

function startRealtime(){
  if(raffleUnsub) raffleUnsub();
  raffleUnsub = onSnapshot(collection(db,'rifas'), snap=>{
    allRaffles=[];
    snap.forEach(d=>{ const r={id:d.id,...d.data()}; if(r.createdBy===currentUser?.uid) allRaffles.push(r); });
    if(currentSection === 'Home') renderHome();
    if(currentSection === 'Draw') renderDraw();
  });
  if(ticketUnsub) ticketUnsub();
  ticketUnsub = onSnapshot(collection(db,'tickets'), snap=>{
    allTickets=[];
    snap.forEach(d=>{ const t={id:d.id,...d.data()}; if(t.adminId===currentUser?.uid) allTickets.push(t); });
    // Actualizar remainingTickets en drawState
    if(activeLiveSession && drawState.active){
      drawState.remainingTickets = allTickets.filter(t => t.raffleId === activeLiveSession.raffleId && !activeLiveSession.winners?.some(w=>w.number===t.number));
    }
  });
  if(paymentUnsub) paymentUnsub();
  paymentUnsub = onSnapshot(collection(db,'payments'), snap=>{
    allPayments=[];
    snap.forEach(d=>allPayments.push({id:d.id,...d.data()}));
  });
}

function watchLiveSession(sessionId){
  if(activeSessionUnsub) activeSessionUnsub();
  activeSessionUnsub = onSnapshot(doc(db,'liveSessions',sessionId), snap=>{
    if(!snap.exists()){ 
      activeLiveSession=null; 
      renderDraw(); 
      const badge=$('liveHeaderBadge'); if(badge) badge.style.display='none';
      const timerHeader=$('liveTimerHeader'); if(timerHeader) timerHeader.style.display='none';
      if(liveTimerInterval) clearInterval(liveTimerInterval);
      return; 
    }
    activeLiveSession = { id:snap.id, ...snap.data() };
    const isLive = activeLiveSession.status==='live';
    const badge = $('liveHeaderBadge');
    if(badge) badge.style.display = isLive ? 'inline-flex' : 'none';
    if(isLive && activeLiveSession.startedAt){
      liveStartTime = new Date(activeLiveSession.startedAt);
      if(!liveTimerInterval) startLiveTimer();
    }
    if(currentSection === 'Draw') renderDraw();
    if(currentSection === 'Stream') renderStream();
    if(currentSection === 'TV') renderTVSection();
    
    // Actualizar remainingTickets en drawState
    if(drawState.active && activeLiveSession.raffleId){
      drawState.remainingTickets = allTickets.filter(t => t.raffleId === activeLiveSession.raffleId && !activeLiveSession.winners?.some(w=>w.number===t.number));
      drawState.winnersSoFar = activeLiveSession.winners || [];
    }
  });
}

function startLiveTimer(){
  if(liveTimerInterval) clearInterval(liveTimerInterval);
  liveTimerInterval = setInterval(() => {
    if(!liveStartTime) return;
    const elapsed = Math.floor((Date.now() - liveStartTime) / 1000);
    const hours = Math.floor(elapsed / 3600);
    const minutes = Math.floor((elapsed % 3600) / 60);
    const seconds = elapsed % 60;
    const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    const timerDisplay = $('liveTimeDisplay');
    if(timerDisplay) timerDisplay.textContent = timeStr;
    const floatingTimer = $('floatingTimer');
    if(floatingTimer && $('floatingCamera').style.display !== 'none') floatingTimer.textContent = timeStr;
    const headerTimer = $('liveTimerHeader');
    if(headerTimer && activeLiveSession && activeLiveSession.status==='live') headerTimer.style.display = 'inline-flex';
    else if(headerTimer) headerTimer.style.display = 'none';
    
    // Actualizar timer en TV fullscreen si está activo
    const tvTimer = document.getElementById('tvFullscreenTimer');
    if(tvTimer) tvTimer.textContent = timeStr;
  }, 1000);
}

// Cuenta regresiva
window.startCountdownAndDraw = async function(){
  const raffleId = $('selectRaffleForDraw')?.value;
  const mode = $('drawMode')?.value || 'online';
  const countdownSecs = parseInt($('countdownTime')?.value || '0');
  if(!raffleId){ showToast('Selecciona una rifa','error'); return; }
  const raffle = allRaffles.find(r=>r.id===raffleId);
  if(!raffle){ showToast('Rifa no encontrada','error'); return; }
  const tickets = allTickets.filter(t=>t.raffleId===raffleId);
  if(tickets.length===0){ showToast('Esta rifa no tiene boletos vendidos','warning'); return; }
  
  closeModal('modalSelectRaffle');
  
  if(countdownSecs > 0){
    await showCountdown(countdownSecs);
  }
  
  await initiateDraw(raffleId, mode, raffle, tickets);
};

async function showCountdown(seconds){
  return new Promise((resolve) => {
    let remaining = seconds;
    const overlay = document.createElement('div');
    overlay.className = 'countdown-overlay';
    overlay.innerHTML = `
      <div class="countdown-card">
        <div class="countdown-title">🎰 LA TÓMBOLA COMIENZA EN</div>
        <div class="countdown-number" id="countdownNumber">${remaining}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:16px;">PREPARA TUS BOLETOS</div>
      </div>
    `;
    document.body.appendChild(overlay);
    
    const interval = setInterval(() => {
      remaining--;

      }

async function enumerateCameras(){
  try{
    await navigator.mediaDevices.getUserMedia({video:true});
    const devices = await navigator.mediaDevices.enumerateDevices();
    camDevices = devices.filter(d=>d.kind==='videoinput');
    if(camDevices.length === 0) showToast('No se encontraron cámaras','error');
  }catch(e){ showToast('No se pudo acceder a la cámara: '+e.message,'error'); }
}

async function startCamera(deviceId, height=720){
  stopCameraAndFloating();
  showLoader('Activando cámara...');
  
  // ESTRATEGIA CORREGIDA PARA CÁMARA TRASERA
  let constraints = null;
  
  if(deviceId && deviceId !== ''){
    // Usar deviceId específico
    constraints = { 
      video: { deviceId: { exact: deviceId }, height: { ideal: height }, width: { ideal: 1280 } }, 
      audio: false 
    };
  } else {
    // Intentar obtener cámara trasera primero (environment)
    try{
      constraints = { 
        video: { facingMode: { exact: "environment" }, height: { ideal: height }, width: { ideal: 1280 } }, 
        audio: false 
      };
    }catch(e){
      constraints = { video: { height: { ideal: height }, width: { ideal: 1280 } }, audio: false };
    }
  }
  
  try{
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    isCamRunning = true;
    hideLoader();
    
    // Usar en la vista normal
    localVideoEl = $('localVideo');
    if(localVideoEl){ localVideoEl.srcObject = currentStream; localVideoEl.style.display='block'; }
    const ph = $('videoPlaceholder'); if(ph) ph.style.display='none';
    
    // Crear ventana flotante si no estamos en la sección Stream
    createFloatingCamera();
    
    showToast('📸 Cámara activada (Trasera por defecto)','success');
    if(activeLiveSession?.id) updateDoc(doc(db,'liveSessions',activeLiveSession.id),{cameraActive:true}).catch(()=>{});
    renderStream();
    renderDraw();
    renderTVSection();
  }catch(e){
    console.error('Error cámara:', e);
    // Último intento: sin restricciones específicas
    try{
      constraints = { video: { height: { ideal: height }, width: { ideal: 1280 } }, audio: false };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      isCamRunning = true;
      hideLoader();
      localVideoEl = $('localVideo');
      if(localVideoEl){ localVideoEl.srcObject = currentStream; localVideoEl.style.display='block'; }
      const ph = $('videoPlaceholder'); if(ph) ph.style.display='none';
      createFloatingCamera();
      showToast('📸 Cámara activada (modo automático)','success');
      if(activeLiveSession?.id) updateDoc(doc(db,'liveSessions',activeLiveSession.id),{cameraActive:true}).catch(()=>{});
      renderStream();
      renderDraw();
      renderTVSection();
    }catch(e2){ 
      hideLoader(); 
      showToast('Error de cámara: No se pudo acceder a ninguna cámara. Verifica permisos.','error');
    }
  }
}

function createFloatingCamera(){
  const floatingDiv = $('floatingCamera');
  const floatingVideo = $('floatingVideo');
  if(!floatingDiv || !floatingVideo) return;
  
  if(floatingStream){
    try{ floatingStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  }
  
  floatingStream = currentStream;
  floatingVideo.srcObject = currentStream;
  
  // Solo mostrar si NO estamos en la sección Stream y hay sesión activa
  if(currentSection !== 'Stream' && isCamRunning && activeLiveSession && activeLiveSession.status === 'live'){
    floatingDiv.style.display = 'block';
  } else {
    floatingDiv.style.display = 'none';
  }
  
  isFloatingMinimized = false;
  floatingDiv.classList.remove('minimized');
  const restoreBtn = $('floatingRestoreBtn');
  const minimizeBtn = $('floatingMinimizeBtn');
  const minimizeControl = $('floatingMinimizeControl');
  const closeControl = $('floatingCloseControl');
  
  if(restoreBtn) restoreBtn.style.display = 'none';
  if(minimizeBtn) minimizeBtn.style.display = 'none';
  if(minimizeControl) minimizeControl.style.display = 'flex';
  if(closeControl) closeControl.style.display = 'flex';
  
  // Hacer draggable
  makeDraggable(floatingDiv);
}

function makeDraggable(element){
  let startX, startY, startLeft, startTop;
  let isDraggingLocal = false;
  
  const onMouseMove = (moveEvent) => {
    if(!isDraggingLocal) return;
    let newLeft = startLeft + (moveEvent.clientX - startX);
    let newTop = startTop + (moveEvent.clientY - startY);
    newLeft = Math.max(0, Math.min(window.innerWidth - element.offsetWidth, newLeft));
    newTop = Math.max(0, Math.min(window.innerHeight - element.offsetHeight, newTop));
    element.style.left = newLeft + 'px';
    element.style.top = newTop + 'px';
    element.style.right = 'auto';
    element.style.bottom = 'auto';
  };
  
  const onMouseUp = () => {
    isDraggingLocal = false;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  };
  
  element.addEventListener('mousedown', (e) => {
    if(e.target.closest('.floating-controls')) return;
    if(e.target.closest('.floating-minimize-btn')) return;
    if(e.target.closest('.floating-restore-btn')) return;
    e.preventDefault();
    const rect = element.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left;
    startTop = rect.top;
    isDraggingLocal = true;
    
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });
}

function stopCameraAndFloating(){
  if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  if(floatingStream){ floatingStream=null; }
  isCamRunning=false;

  if(floatingDiv) floatingDiv.style.display = 'none';
  if(activeLiveSession?.id) updateDoc(doc(db,'liveSessions',activeLiveSession.id),{cameraActive:false}).catch(()=>{});
  
  const localVideo = $('localVideo');
  if(localVideo) localVideo.style.display = 'none';
  const videoPlaceholder = $('videoPlaceholder');
  if(videoPlaceholder) videoPlaceholder.style.display = 'flex';
}

window.switchCamera = async function(){
  await enumerateCameras();
  if(camDevices.length<2){ showToast('Solo hay una cámara disponible','info'); return; }
  const currentId = currentStream?.getVideoTracks()[0]?.getSettings()?.deviceId;
  // Encontrar la siguiente cámara (preferir trasera si está disponible)
  let nextDevice = camDevices.find(d => d.deviceId !== currentId);
  if(!nextDevice && camDevices.length > 0) nextDevice = camDevices[0];
  if(nextDevice){
    await startCamera(nextDevice.deviceId, 720);
    showToast('Cámara cambiada correctamente','success');
  } else {
    showToast('No se pudo cambiar la cámara','error');
  }
};

    const interval = setInterval(updateTimer, 1000);
    overlay.dataset.timerInterval = interval;
  }
};

window.closeTVFullscreen = function(){
  const overlay = document.querySelector('.tv-fullscreen-overlay');
  if(overlay){
    if(overlay.dataset.timerInterval) clearInterval(parseInt(overlay.dataset.timerInterval));
    if(overlay.dataset.ballInterval) clearInterval(parseInt(overlay.dataset.ballInterval));
    overlay.remove();
  }
  document.body.style.overflow = '';
  tvFullscreenActive = false;
};

function renderDraw(){
  if(!activeLiveSession || activeLiveSession.status==='ended'){
    $('drawContent').innerHTML=`<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:50px;margin-bottom:14px">🎰</div><div style="font-size:20px;font-weight:800;color:var(--success);margin-bottom:8px">Tómbola en Vivo</div><p style="color:rgba(255,255,255,.45);font-size:12px;margin-bottom:20px">Inicia una tómbola para comenzar el sorteo</p><button class="btn-primary live-btn" onclick="openSelectRaffle()"><i class="fas fa-play-circle"></i> Iniciar Tómbola</button></div>`;
    return;
  }
  const raffle = allRaffles.find(r=>r.id===activeLiveSession.raffleId);
  const mode = activeLiveSession.mode;
  const winners = activeLiveSession.winners||[];
  const prizeCount = activeLiveSession.prizeCount||1;
  const currentPrize = winners.length;
  const done = currentPrize>=prizeCount;

  let html = `<div class="card"><div class="card-header"><div><div class="card-title">${raffle?.name||activeLiveSession.raffleName}</div><div style="font-size:10px">${mode==='manual'?'📷 Sorteo Manual':'🎰 Sorteo Digital'} · ${prizeCount} premio(s)</div></div><span class="badge" style="background:rgba(231,111,81,.15);color:var(--danger)">🔴 EN VIVO</span></div><div class="stats-grid"><div class="stat-box"><div class="stat-label">Premios</div><div class="stat-value">${prizeCount}</div></div><div class="stat-box"><div class="stat-label">Entregados</div><div class="stat-value" style="color:var(--success)">${winners.length}</div></div><div class="stat-box"><div class="stat-label">Restantes</div><div class="stat-value" style="color:var(--warning)">${prizeCount-winners.length}</div></div></div>`;
  
  // Botón TV en la sección sorteo
  html += `<div style="margin-top:10px"><button class="tv-icon-btn" onclick="changeSection('TV')"><i class="fas fa-tv"></i> Ver en Modo TV</button></div></div>`;

  if(mode==='online'){
    html += `<div class="draw-arena"><div id="drawPrizeLabel" class="draw-prize-label">${done?'SORTEO COMPLETADO':`SORTEANDO ${getPrizeLbl(currentPrize+1)}`}</div><div class="ball-container"><div class="main-ball ${done&&winners.length>0?getBallClass(winners.length-1):''}" id="mainBall">${done&&winners.length>0?'#'+padNum(winners[winners.length-1].number,raffle?.digits||3):'?'}</div></div><div class="draw-subtitle" id="drawSubtitle">${done?'¡Sorteo finalizado!':drawState.animInterval?'Sorteando...':'Presiona para sortear'}</div><div class="countdown-bar" id="countdownBar">Siguiente en...</div>${!done&&activeLiveSession.status==='live'?`<button class="btn-primary live-btn" id="drawActionBtn" onclick="performDraw()"><i class="fas fa-random"></i> ${currentPrize===0?'Iniciar Sorteo':'Sortear Siguiente'}</button>`:''}</div>`;
  } else {
    html += `<div class="draw-arena"><div style="font-weight:700;margin-bottom:10px"><i class="fas fa-dice"></i> Registrar Ganador Manual</div><div class="inp-group"><select id="manualPrizePos" style="width:100%;padding:10px;background:rgba(45,27,78,.5);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff">${Array.from({length:prizeCount-winners.length},(_, i)=>`<option value="${winners.length+i+1}">${getPrizeLbl(winners.length+i+1)}</option>`).join('')}</select></div><div class="inp-group"><input type="number" id="manualWinnerNum" placeholder="Número ganador..." style="width:100%;padding:10px;background:rgba(45,27,78,.5);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:16px;text-align:center"></div>${!done&&activeLiveSession.status==='live'?`<button class="btn-primary" style="width:100%" onclick="registerManualDrawWinner()"><i class="fas fa-trophy"></i> Registrar Ganador</button>`:''}</div>`;
  }

  if(winners.length>0){
    html += `<div style="font-weight:700;font-size:13px;margin:16px 0 10px;color:var(--warning)"><i class="fas fa-trophy"></i> Ganadores</div><div class="winners-list">${winners.map((w,i)=>`<div class="winner-card"><div class="winner-medal">${getMedal(i)}</div><div><div class="winner-number">#${padNum(w.number,raffle?.digits||3)}</div><div class="winner-name">${w.clientName||'N/A'}</div><div class="winner-sub">${w.clientPhone||''}</div><div class="winner-prize">${getPrizeLbl(i+1)}</div></div></div>`).join('')}</div>`;
  }

  $('drawContent').innerHTML = html;
}

window.performDraw = async function(){
  if(!activeLiveSession||!drawState.active) return;
  const raffle = allRaffles.find(r=>r.id===drawState.raffleId);
  if(!raffle) return;
  if(drawState.animInterval) return;
  const prizeIndex = (activeLiveSession.winners||[]).length;
  if(prizeIndex>=drawState.prizeCount){ showToast('¡Todos los premios ya fueron sorteados!','info'); return; }
  
  const lbl = $('drawPrizeLabel'); if(lbl) lbl.textContent=`SORTEANDO ${getPrizeLbl(prizeIndex+1)}`;
  const subtitle = $('drawSubtitle'); if(subtitle) subtitle.textContent='Sorteando...';
  const btn = $('drawActionBtn'); if(btn) btn.style.display='none';
  const ball = $('mainBall');
  if(ball){ ball.className='main-ball spinning'; }

  drawState.animInterval = setInterval(()=>{
    if(!drawState.remainingTickets.length) return;
    const t = drawState.remainingTickets[Math.floor(Math.random()*drawState.remainingTickets.length)];
    if(ball) ball.textContent='#'+padNum(t.number,raffle.digits||3);
  },80);

  drawState.timeout = setTimeout(async()=>{
    clearInterval(drawState.animInterval);
    drawState.animInterval=null;
    if(drawState.remainingTickets.length === 0){
      showToast('No hay más boletos disponibles para sortear','warning');
      if(btn) btn.style.display='flex';
      if(ball) ball.className='main-ball';
      return;
    }
    const winner = drawState.remainingTickets[Math.floor(Math.random()*drawState.remainingTickets.length)];
    if(!winner){ showToast('Error al seleccionar ganador','error'); return; }
    if(ball){ ball.className=`main-ball winner ${getBallClass(prizeIndex)}`; ball.textContent='#'+padNum(winner.number,raffle.digits||3); }
    if(subtitle) subtitle.textContent=`🏆 ${winner.clientName} — ${getPrizeLbl(prizeIndex+1)}`;

    drawState.remainingTickets=drawState.remainingTickets.filter(t=>t.id!==winner.id);
    const newWinner = { number:winner.number, clientName:winner.clientName, clientPhone:winner.clientPhone, clientId:winner.clientId };
    const newWinners = [...(activeLiveSession.winners||[]), newWinner];

    try{
      await updateDoc(doc(db,'liveSessions',activeLiveSession.id),{ winners:newWinners, currentPrize:newWinners.length });
      const isAllDone = newWinners.length>=drawState.prizeCount;
      await updateDoc(doc(db,'rifas',raffle.id),{ winners:newWinners.map(w=>w.number), drawCompleted:isAllDone });
    }catch(e){ showToast('Error guardando: '+e.message,'error'); }

    showToast(`🏆 ${getPrizeLbl(prizeIndex+1)}: #${padNum(winner.number,raffle.digits||3)} — ${winner.clientName}`,'success');
    launchConfetti();

    const done = newWinners.length>=drawState.prizeCount;
    if(!done){
      let secs = 10;
      const cdBar = $('countdownBar');
      if(cdBar){ cdBar.style.display='block'; cdBar.textContent=`Siguiente en ${secs}s`; cdBar.classList.add('active'); }
      drawState.countdownInterval=setInterval(()=>{
        secs--;
        if(cdBar) cdBar.textContent=`Siguiente en ${secs}s`;
        if(secs<=0){
          clearInterval(drawState.countdownInterval);
          if(cdBar){ cdBar.style.display='none'; cdBar.classList.remove('active'); }
          const btn2=$('drawActionBtn'); if(btn2) btn2.style.display='flex';
          if(ball){ ball.className='main-ball'; ball.textContent='?'; }
          if(subtitle) subtitle.textContent='Presiona para siguiente premio';
          const lbl2=$('drawPrizeLabel'); if(lbl2) lbl2.textContent=`SORTEANDO ${getPrizeLbl(newWinners.length+1)}`;
        }
      },1000);
    } else {
      if(subtitle) subtitle.textContent='🎉 ¡Sorteo completado!';
      if(lbl) lbl.textContent='SORTEO COMPLETADO';
      try{ await updateDoc(doc(db,'liveSessions',activeLiveSession.id),{status:'ended'}); }catch(e){}
      localStorage.removeItem('rifapool_active_session');
      showToast('🎊 ¡Sorteo completado!','success');
      setTimeout(()=>renderDraw(),2000);
    }
  }, 3000);
};

window.registerManualDrawWinner = async function(){
  if(!activeLiveSession) return;
  const num = parseInt($('manualWinnerNum')?.value);
  if(!num||num<1){ showToast('Ingresa el número ganador','error'); return; }
  const raffle = allRaffles.find(r=>r.id===activeLiveSession.raffleId);
  if(!raffle) return;
  const ticket = allTickets.find(t=>t.raffleId===raffle.id&&t.number===num);
  if(!ticket){ showToast(`El boleto #${padNum(num,raffle.digits||3)} no fue vendido`,'error'); return; }
  const prizeIndex = (activeLiveSession.winners||[]).length;
  if(prizeIndex>=drawState.prizeCount){ showToast('Ya se asignaron todos los premios','warning'); return; }
  const newWinner = { number:num, clientName:ticket.clientName, clientPhone:ticket.clientPhone, clientId:ticket.clientId };
  const newWinners = [...(activeLiveSession.winners||[]), newWinner];
  showLoader('Registrando...');
  try{
    await updateDoc(doc(db,'liveSessions',activeLiveSession.id),{ winners:newWinners, currentPrize:newWinners.length });
    const isAllDone = newWinners.length>=drawState.prizeCount;
    await updateDoc(doc(db,'rifas',raffle.id),{ winners:newWinners.map(w=>w.number), drawCompleted:isAllDone });
    hideLoader();
    showToast(`🏆 Ganador registrado: #${padNum(num,raffle.digits||3)} — ${ticket.clientName}`,'success');
    launchConfetti();
    renderDraw();
  }catch(e){ hideLoader(); showToast('Error: '+e.message,'error'); }
};

function renderHome(){
  const active = allRaffles.filter(r=>r.status==='active');
  const totalSold = allTickets.length;
  const totalRevenue = allTickets.reduce((s,t)=>{ const r=allRaffles.find(ra=>ra.id===t.raffleId); return s+(r?parseFloat(r.ticketPrice||0):0); },0);
  const totalPaid = allPayments.reduce((s,p)=>s+(p.paid||0),0);

  let html = `<div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Dashboard</div><div class="stats-grid"><div class="stat-box"><div class="stat-label">Rifas</div><div class="stat-value">${allRaffles.length}</div></div><div class="stat-box"><div class="stat-label">Boletos</div><div class="stat-value">${totalSold}</div></div><div class="stat-box"><div class="stat-label">Cobrado</div><div class="stat-value" style="font-size:14px">${money(totalPaid)}</div></div></div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn-primary live-btn" style="flex:2" onclick="openSelectRaffle()"><i class="fas fa-play-circle"></i> Iniciar Tómbola</button><button class="btn-secondary" style="flex:1" onclick="openSharePanel()"><i class="fas fa-share-alt"></i> Compartir</button></div></div>`;
  html += `<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--success)"><i class="fas fa-list"></i> Mis Rifas (${allRaffles.length})</div>`;
  if(allRaffles.length===0){
    html += `<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:10px">🎰</div><p style="color:rgba(255,255,255,.4);font-size:12px">Sin rifas creadas.</p></div>`;
  } else {
    html += allRaffles.map(r=>{
      const sold=r.soldTickets||0, total=r.totalTickets||0;
      const pct=total>0?Math.round(sold/total*100):0;
      const isActive=r.status==='active';
      return `<div class="card"><div class="card-header"><div><div class="card-title"><i class="fas fa-dice"></i> ${r.name}</div><div style="font-size:9px;color:rgba(255,255,255,.4)">${fmtDate(r.endDate)}</div></div><span class="badge" style="${isActive?'background:rgba(64,145,108,.15);color:var(--success)':'background:rgba(231,111,81,.15);color:var(--danger)'}">${isActive?'ACTIVA':'CERRADA'}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="stats-grid"><div class="stat-box"><div class="stat-label">Vendidos</div><div class="stat-value" style="font-size:16px">${sold}</div></div><div class="stat-box"><div class="stat-label">Total</div><div class="stat-value" style="font-size:16px">${total}</div></div><div class="stat-box"><div class="stat-label">%</div><div class="stat-value" style="font-size:16px">${pct}%</div></div></div>${isActive?`<button class="btn-primary live-btn" onclick="openSelectRaffleFor('${r.id}')"><i class="fas fa-play-circle"></i> Sortear Esta Rifa</button>`:`<div style="text-align:center;font-size:11px;color:rgba(255,255,255,.3);padding:4px">${r.drawCompleted?'✅ Sorteo Completado':'Rifa Cerrada'}</div>`}</div>`;
    }).join('');
  }
  $('homeContent').innerHTML = html;
}

function renderHistory(){
  const winners=[];
  for(const r of allRaffles){
    if(!r.winners?.length) continue;
    for(let i=0;i<r.winners.length;i++){
      const wNum = r.winners[i];
      const t = allTickets.find(tk=>tk.raffleId===r.id&&tk.number===wNum);
      winners.push({ raffleName:r.name, number:wNum, position:i+1, clientName:t?t.clientName:'N/A', date:r.drawDate||r.endDate, digits:r.digits||3 });
    }
  }
  winners.sort((a,b)=>new Date(b.date)-new Date(a.date));
  $('historyContent').innerHTML = `<div class="card-title"><i class="fas fa-trophy"></i> Historial de Ganadores</div>${winners.length===0?`<div class="card" style="text-align:center;padding:40px"><div style="font-size:40px">🏆</div><p>Sin sorteos realizados</p></div>`:winners.map(w=>`<div class="winner-card"><div class="winner-medal">${getMedal(w.position-1)}</div><div><div class="winner-number">#${padNum(w.number,w.digits)}</div><div class="winner-name">${w.clientName}</div><div class="winner-sub">${w.raffleName}</div><div style="font-size:9px;color:rgba(255,255,255,.3)">${fmtDate(w.date)}</div></div></div>`).join('')}`;
}

function getViewerUrl(){
  const base = location.href.split('?')[0].split('#')[0];
  const sessionId = activeLiveSession?.id||'';
  const adminId = currentUser?.uid||'';
  return `${base}?view=${adminId}&session=${sessionId}`;
}

window.openSelectRaffle = function(){ 
  const sel = $('selectRaffleForDraw');
  const opts = allRaffles.filter(r=>r.status==='active').map(r=>`<option value="${r.id}">${r.name} (${r.soldTickets||0} boletos)</option>`).join('');
  if(sel) sel.innerHTML = opts||'<option value="">Sin rifas activas</option>';
  $('modalSelectRaffle').classList.add('active');
};
window.openSelectRaffleFor = function(raffleId){
  const sel = $('selectRaffleForDraw');
  const opts = allRaffles.filter(r=>r.status==='active').map(r=>`<option value="${r.id}" ${r.id===raffleId?'selected':''}>${r.name} (${r.soldTickets||0} boletos)</option>`).join('');
  if(sel) sel.innerHTML = opts;
  $('modalSelectRaffle').classList.add('active');
};

window.openSharePanel = function(){
  if(!activeLiveSession){ showToast('Primero inicia una tómbola','warning'); return; }
  const url = getViewerUrl();
  const inp = $('shareLinkInput'); if(inp) inp.value=url;
  $('modalShareLink').classList.add('active');
};

window.copyShareLink = function(){
  const inp = $('shareLinkInput'); if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(()=>showToast('✅ Link copiado','success')).catch(()=>{ inp.select(); document.execCommand('copy'); showToast('Link copiado','success'); });
};

window.copyStreamLink = function(){
  const inp = $('streamLinkInput'); if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(()=>showToast('✅ Link copiado','success')).catch(()=>{ inp.select(); document.execCommand('copy'); showToast('Link copiado','success'); });
};

window.shareStreamWhatsApp = function(){
  const url = getViewerUrl();
  const msg = `🎰 ¡Tómbola EN VIVO!\n\nVe el sorteo aquí:\n${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
};

window.shareViaWhatsApp = function(){ shareStreamWhatsApp(); closeModal('modalShareLink'); };

function launchConfetti(){
  const container = $('confettiContainer');
  if(!container) return;
  const colors=['#e9c46a','#40916c','#e76f51','#3498db','#9b59b6'];
  for(let i=0;i<50;i++){
    const piece = document.createElement('div');
    piece.className='confetti-piece';
    piece.style.cssText=`left:${Math.random()*100}%;top:0;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.8}s`;
    container.appendChild(piece);
    setTimeout(()=>piece.remove(),4000);
  }
}

(async function init(){
  let saved=null;
  try{ saved=JSON.parse(localStorage.getItem('rifapool_live_admin')||'null'); }catch(e){}
  if(saved?.uid){
    try{
      const snap=await getDoc(doc(db,'Collaborators',saved.uid));
      if(snap.exists()&&snap.data().role==='admin'){
        currentUser={uid:snap.id,...snap.data()};
        activeAdminIdForSession = currentUser.uid;
        await afterLogin();
        return;
      }
    }catch(e){ console.warn(e); }
  }
  setTimeout(()=>{ $('loadingScreen').style.display='none'; $('loginScreen').style.display='flex'; },1200);
})();
